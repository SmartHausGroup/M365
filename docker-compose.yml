version: '3.9'

services:
  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "/policies"]
    ports:
      - "8182:8181"
    volumes:
      - ./policies:/policies:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 3s
      retries: 10

  ops-adapter:
    build:
      context: .
      dockerfile: Dockerfile.ops-adapter
    ports:
      - "${OPS_ADAPTER_PORT:-18080}:8080"
    env_file:
      - instances/sandbox.env
    environment:
      # Allow overriding OPA URL to point at Enterprise policy-engine
      - OPA_URL=${OPA_URL:-http://opa:8181}
      - REGISTRY_FILE=/app/registry/agents.yaml
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs

  m365-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${M365_DASHBOARD_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  enterprise-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${ENTERPRISE_DASHBOARD_PORT:-18001}:8001"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    command: python -m src.provisioning_api.enterprise_dashboard
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  business-operations:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${BUSINESS_OPERATIONS_PORT:-18002}:8002"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    command: python -m src.provisioning_api.business_operations
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-workstation:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${AGENT_WORKSTATION_PORT:-18003}:8003"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    command: python -m src.provisioning_api.agent_workstation
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-command-center:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${AGENT_COMMAND_CENTER_PORT:-18004}:8004"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    command: python -m src.provisioning_api.agent_command_center
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  unified-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${UNIFIED_DASHBOARD_PORT:-18005}:8005"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_DIR=/app/logs
    volumes:
      - ./registry:/app/registry:ro
      - ./logs:/app/logs
    command: python -m src.provisioning_api.unified_dashboard
    depends_on:
      - ops-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
