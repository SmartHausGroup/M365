<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h1>Auth Test</h1>
    <button id="test-btn">Test Button</button>
    <div id="output"></div>
    
    <script>
        // Simulate the same environment as the live site
        var __INJECTED_API__ = '';
        
        const API_BASE = (window.__INJECTED_API__ || window.location.origin).replace(/\/$/, '');
        
        console.log('__INJECTED_API__:', window.__INJECTED_API__);
        console.log('window.location.origin:', window.location.origin);
        console.log('API_BASE calculated:', API_BASE);
        
        document.getElementById('test-btn').onclick = () => {
            console.log('Button clicked!');
            console.log('API_BASE:', API_BASE);
            
            const ret = window.location.href.split('#')[0];
            const loginUrl = `${API_BASE}/api/auth/login?r=${encodeURIComponent(ret)}`;
            
            console.log('Return URL:', ret);
            console.log('Login URL:', loginUrl);
            
            document.getElementById('output').innerHTML = `
                <p>API_BASE: ${API_BASE}</p>
                <p>Return URL: ${ret}</p>
                <p>Login URL: ${loginUrl}</p>
            `;
            
            // Don't actually redirect in test
            // window.location.href = loginUrl;
        };
    </script>
</body>
</html>
