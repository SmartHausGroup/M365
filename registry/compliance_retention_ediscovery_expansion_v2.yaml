  - docs/contracts/caio-m365/ACTION_SPECIFICATION.md
  - docs/contracts/M365_CAPABILITIES_UNIVERSE.md
  - registry/capability_registry.yaml
  - registry/executor_routing_v2.yaml
  - registry/auth_model_v2.yaml
  - registry/approval_risk_matrix_v2.yaml
deterministic_rule: >
  E4CComplianceEDiscoveryExpansion(action) = InstructionBacked(action) ∧
  CapabilityRegistryImplemented(action) ∧ ExecutorRoute(action)=compliance ∧
  AuthClass(action)=app_only.
supported_actions:
  list_ediscovery_cases:
    canonical_action_key: compliance.ediscovery_case.list
    agent_alias: compliance.cases
    runtime_handler: ComplianceEDiscoveryClient.list_ediscovery_cases
    mutating: false
    result_shape_keys: [cases, count]
    required_permissions: [eDiscovery.Read.All]
    approval_profile: low-observe-create
    capability_registry_alias: list_ediscovery_cases
  get_ediscovery_case:
    canonical_action_key: compliance.ediscovery_case.read
    agent_alias: compliance.case_get
    runtime_handler: ComplianceEDiscoveryClient.get_ediscovery_case
    mutating: false
    result_shape_keys: [case]
    required_permissions: [eDiscovery.Read.All]
    approval_profile: low-observe-create
    capability_registry_alias: get_ediscovery_case
  create_ediscovery_case:
    canonical_action_key: compliance.ediscovery_case.create
    agent_alias: compliance.case_create
    runtime_handler: ComplianceEDiscoveryClient.create_ediscovery_case
    mutating: true
    result_shape_keys: [case, status]
    required_permissions: [eDiscovery.ReadWrite.All]
    approval_profile: critical-regulated
    capability_registry_alias: create_ediscovery_case
  list_ediscovery_case_searches:
