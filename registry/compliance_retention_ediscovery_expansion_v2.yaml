    agent_alias: compliance.case_search_get
    runtime_handler: ComplianceEDiscoveryClient.get_ediscovery_case_search
    mutating: false
    result_shape_keys: [search]
    required_permissions: [eDiscovery.Read.All]
    approval_profile: low-observe-create
    capability_registry_alias: get_ediscovery_case_search
  create_ediscovery_case_search:
    canonical_action_key: compliance.ediscovery_search.create
    agent_alias: compliance.case_search_create
    runtime_handler: ComplianceEDiscoveryClient.create_ediscovery_case_search
    mutating: true
    result_shape_keys: [search, status]
