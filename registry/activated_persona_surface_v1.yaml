contract:
  id: activated-persona-surface
  display_name: Activated Persona Surface Certification v1
  status: contract-defined
  description: >
    Certifies the current M365-backed activated persona surface on the
    review feature branch by aggregating the P2B through P2D activation
    waves into one deterministic commercialization boundary. The deferred
    external-platform personas are explicitly excluded from the certified
    active surface and remain out of scope for current claims.

certification_phases:
  - order: 1
    id: surface_partition_integrity
    description: >
      Verify the authoritative persona registry partitions the workforce
      into 34 registry-backed personas and 5 deferred external-platform
      personas with no uncategorized entries.
    inputs:
      - registry/persona_registry_v2.yaml
      - registry/persona_capability_map.yaml
    outputs:
      - active/deferred partition verdict
    failure_mode: >
      Any mismatch between actual registry state and declared active/deferred
      counts fails certification.

  - order: 2
    id: wave_evidence_aggregation
    description: >
      Verify the three activation-wave scorecards for P2B, P2C, and P2D
      exist, are green, and together support the claimed active surface.
    inputs:
      - artifacts/scorecards/scorecard_l73.json
      - artifacts/scorecards/scorecard_l74.json
      - artifacts/scorecards/scorecard_l75.json
    outputs:
      - aggregated wave evidence verdict
    failure_mode: >
      Missing or non-green wave scorecard fails certification.

  - order: 3
    id: deferred_external_exclusion
    description: >
      Verify the deferred external-platform personas remain contract-only,
      have zero allowed actions, and are not counted inside the current
      active commercialization surface.
    inputs:
      - registry/persona_registry_v2.yaml
      - registry/agents.yaml
    outputs:
      - deferred persona exclusion verdict
    failure_mode: >
      Any deferred external persona with active status or non-zero actions
      fails certification.

  - order: 4
    id: commercial_boundary_lock
    description: >
      Verify the commercialization boundary is documented for the current
      activated surface and the historical packaging baseline points to the
      branch-specific activated-surface authority.
    inputs:
      - docs/commercialization/m365-activated-persona-surface-v1.md
      - docs/commercialization/m365-workforce-packaging-v1.md
    outputs:
      - bounded-claim and packaging-delta verdict
    failure_mode: >
      Missing branch-specific activated-surface documentation or misleading
      packaging language fails certification.

governance_rules:
  fail_closed:
    description: >
      Any missing evidence or count mismatch fails certification.
  audit_completeness:
    description: >
      Certification produces traceable evidence back to the registries,
      prior wave scorecards, and commercialization boundary docs.
  bounded_claims:
    description: >
      Claims must not exceed the current M365-backed activated surface.
  determinism:
    description: >
      Same branch state must produce the same active/deferred partition.
  deferred_external_exclusion:
    description: >
      Deferred external-platform personas remain explicitly non-active until
      later P3 preparation and credential-gated runtime work is complete.

