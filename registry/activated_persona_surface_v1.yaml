contract:
  id: activated-persona-surface
  display_name: Activated Persona Surface Certification v1
  status: contract-defined
  description: >
    Certifies the final governed M365-backed activated persona surface after
    H5 closes the activation gate and promotes the governed 20 staged personas.
    The five external-platform marketing personas remain explicitly deferred
    and out of the active surface.

certification_phases:
  - order: 1
    id: activation_prerequisite_integrity
    description: >
      Verify the governed 20 promoted personas satisfy the fail-closed H5
      prerequisite inventory before any activation-state publication occurs.
    inputs:
      - registry/authoritative_digital_employee_records_v1.yaml
      - registry/persona_capability_map.yaml
      - registry/persona_registry_v2.yaml
      - configs/generated/authoritative_persona_activation_gate_closeout_v1_verification.json
    outputs:
      - promoted persona prerequisite verdict
    failure_mode: >
      Any missing name, title, department, manager, escalation owner,
      capability-map entry, or authoritative registry entry fails certification.

  - order: 2
    id: final_registry_partition
    description: >
      Verify the final authoritative registry partitions the workforce into
      54 registry-backed active personas and 5 deferred external-platform
      planned personas across all 10 departments.
    inputs:
      - registry/persona_registry_v2.yaml
      - registry/persona_capability_map.yaml
    outputs:
      - final active/deferred partition verdict
    failure_mode: >
      Any mismatch between the authoritative registry, capability map, and
      declared H5 final counts fails certification.

  - order: 3
    id: deferred_external_exclusion
    description: >
      Verify the five deferred external-platform personas remain contract-only,
      keep zero allowed actions, and are not counted inside the certified
      active commercialization surface.
    inputs:
      - registry/persona_registry_v2.yaml
      - registry/agents.yaml
    outputs:
      - deferred persona exclusion verdict
    failure_mode: >
      Any deferred external persona with active status or non-zero actions
      fails certification.

  - order: 4
    id: commercial_boundary_lock
    description: >
      Verify the activated-surface and packaging commercialization documents
      both publish the same final H5 boundary and do not defer to stale
      staged or historical action counts.
    inputs:
      - docs/commercialization/m365-activated-persona-surface-v1.md
      - docs/commercialization/m365-workforce-packaging-v1.md
      - artifacts/scorecards/scorecard_l81.json
    outputs:
      - bounded-claim and packaging alignment verdict
    failure_mode: >
      Missing final-state documentation or any stale 34/25/298 or 4/35/155
      claim fails certification.

governance_rules:
  fail_closed:
    description: >
      Any missing evidence or count mismatch fails certification.
  audit_completeness:
    description: >
      Certification produces traceable evidence back to the registries, the
      L81 proof artifact, and the commercialization boundary docs.
  bounded_claims:
    description: >
      Claims must not exceed the final governed M365-backed activated surface.
  determinism:
    description: >
      Same branch state must produce the same final active/deferred partition.
  deferred_external_exclusion:
    description: >
      Deferred external-platform personas remain explicitly non-active until
      later platform-specific runtime and credential work is complete.

