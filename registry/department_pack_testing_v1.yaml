department:
  id: testing
  display_name: Testing
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Testing digital employees into one bounded department pack. Api-tester is now a registry-backed foundation
    operator; the remaining four personas are defined but not yet action-backed.
  bounded_claim: The Testing department pack may claim registry-backed execution coverage for api-tester (8 actions) only.
    The remaining four personas retain contract-only status until later activation acts.
workflow_families:
- qa_automation_and_regression
- performance_measurement_and_benchmarking
- test_analysis_and_quality_reporting
- tool_evaluation_and_workflow_optimization
workload_families:
- Low-code, workflow, and analytics
- Tasks, scheduling, and work management
- Knowledge, search, and employee experience
- Documents, notes, and workspace productivity
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the testing lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:testing
  department_lead: department-lead:testing
  profiles:
    medium-operational:
      approvers:
      - department-owner:testing
      personas:
      - workflow-optimizer
      rule: Process changes, workflow tuning, and automation opportunity mapping require department-owner review when later
        acts activate the Testing personas.
    low-observe-create:
      approvers:
      - department-owner:testing
      personas:
      - api-tester
      - performance-benchmarker
      - test-results-analyzer
      - tool-evaluator
      rule: QA automation, benchmarking, test analysis, and tool evaluation may proceed in observe/create mode until later
        acts activate mutating Testing execution surfaces.
