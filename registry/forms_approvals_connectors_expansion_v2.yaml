    runtime_handler: FormsApprovalsConnectorsClient.add_external_group_member
    mutating: true
    result_shape_keys: [groupId, memberId, status]
    required_permissions: [ExternalItem.ReadWrite.OwnedBy]
    approval_profile: medium-operational
    capability_registry_alias: add_external_group_member
