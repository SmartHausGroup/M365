department:
  id: engineering
  display_name: Engineering
  wave: W6
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Engineering digital employees into one bounded department pack. Backend-architect and devops-automator
    are now registry-backed foundation operators; the remaining five personas are defined but not yet action-backed.
  bounded_claim: The Engineering department pack may claim registry-backed execution coverage for backend-architect (13 actions)
    and devops-automator (10 actions) only. The remaining five personas retain contract-only status until later activation
    acts.
workflow_families:
- architecture_and_integration_design
- automation_and_release_engineering
- product_experience_and_frontend_delivery
- prototyping_and_validation_support
workload_families:
- Low-code, workflow, and analytics
- Documents, notes, and workspace productivity
- Content, intranet, and files
- Devices, endpoint management, and adjacent Windows admin surfaces
- Knowledge, search, and employee experience
- Identity, directory, and tenant administration
- Security, compliance, and data governance
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the engineering lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:engineering
  department_lead: department-lead:engineering
  profiles:
    medium-operational:
      approvers:
      - department-owner:engineering
      personas:
      - ai-engineer
      - backend-architect
      - devops-automator
      rule: Architecture, automation, and infrastructure changes require department-owner review when later acts activate
        these personas.
    low-observe-create:
      approvers:
      - department-owner:engineering
      personas:
      - frontend-developer
      - mobile-app-builder
      - rapid-prototyper
      - test-writer-fixer
      rule: Draft, prototype, and implementation changes may proceed in observe/create mode until later acts activate their
        bounded action surfaces.
