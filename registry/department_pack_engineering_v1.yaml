bounded_claims:
  supported:
  - engineering persona census and capability-family contract
  - approval and escalation semantics for future engineering activation
  - deterministic blocked-state projection while engineering remains contract-only
  unsupported:
  - claims that engineering personas are currently action-backed
  - production engineering execution beyond explicit later activation acts
  - finance, HR, or communication work outside the engineering contract
