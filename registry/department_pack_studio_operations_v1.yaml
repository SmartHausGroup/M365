department:
  id: studio-operations
  display_name: Studio Operations
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Studio Operations digital employees into one bounded department pack that reconciles to the staged post-H3 authoritative roster. Five studio-operations personas remain action-backed while four promoted personas stay contract-only.
  bounded_claim: The Studio Operations department pack may claim registry-backed execution coverage only for Amanda Foster, Lisa Chang, Jennifer Liu, Robert Kim, Mike Rodriguez. The remaining 4 promoted personas remain persona-contract-only with zero supported actions until later activation acts.
workflow_families:
- reporting_and_operational_visibility
- finance_and_control_review
- infrastructure_reliability_and_compliance_support
- support_and_case_coordination
- knowledge_enablement_and_documentation
workload_families:
- Low-code, workflow, and analytics
- Security, compliance, and data governance
- Devices, endpoint management, and adjacent Windows admin surfaces
- Mail, calendar, contacts, and bookings
- Knowledge, search, and employee experience
- Documents, notes, and workspace productivity
- Content, intranet, and files
- Collaboration, meetings, and communities
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the studio-operations lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:studio-operations
  department_lead: department-lead:studio-operations
  profiles:
    critical-regulated:
      approvers:
      - department-owner:studio-operations
      personas:
      - financial-operations-agent
      - legal-compliance-checker
      rule: Dual human approval and explicit sign-off are required for regulated, personnel-state, legal, security, or compliance-sensitive mutations.
    high-impact:
      approvers:
      - department-owner:studio-operations
      personas:
      - finance-tracker
      rule: Human approval is required for tenant, public-facing, financial, or organization-wide changes; destructive or privileged mutations remain explicitly gated.
    medium-operational:
      approvers:
      - department-owner:studio-operations
      personas:
      - client-relationship-agent
      - infrastructure-maintainer
      rule: Routine internal mutations require department-owner review; cross-department or externally visible changes remain gated until later activation acts widen the surface.
    low-observe-create:
      approvers:
      - department-owner:studio-operations
      personas:
      - analytics-reporter
      - knowledge-management-agent
      - reports
      - support-responder
      rule: Draft, research, planning, and internal-preparation work may proceed in observe/create mode until later activation acts unlock mutating execution surfaces.
