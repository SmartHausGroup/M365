department:
  id: studio-operations
  display_name: Studio Operations
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: >-
    Package the Studio Operations digital employees into one bounded department
    pack. Analytics-reporter and support-responder are now registry-backed
    foundation operators; the remaining three personas are defined but not yet
    action-backed.
  bounded_claim: >-
    The Studio Operations department pack may claim registry-backed execution
    coverage for analytics-reporter (9 actions) and support-responder (8
    actions) only. The remaining three personas (finance-tracker,
    infrastructure-maintainer, legal-compliance-checker) retain contract-only
    status until later activation acts.
workflow_families:
  - reporting_and_operational_visibility
  - finance_and_control_review
  - infrastructure_reliability_and_compliance_support
  - support_and_case_coordination
workload_families:
  - Low-code, workflow, and analytics
  - Security, compliance, and data governance
  - Devices, endpoint management, and adjacent Windows admin surfaces
  - Mail, calendar, contacts, and bookings
  - Knowledge, search, and employee experience
  - Documents, notes, and workspace productivity
  - Content, intranet, and files
  - Collaboration, meetings, and communities
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the studio-operations lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:studio-operations
  department_lead: department-lead:studio-operations
  profiles:
    critical-regulated:
      approvers:
        - department-owner:studio-operations
      personas:
        - legal-compliance-checker
      rule: >-
        Legal, policy, and compliance-sensitive changes require explicit
        department-owner review when later acts activate the Studio Operations
        personas.
    high-impact:
      approvers:
        - department-owner:studio-operations
      personas:
        - finance-tracker
      rule: >-
        Finance controls, budget-affecting changes, and externally consequential
        financial updates require human approval before execution.
    medium-operational:
      approvers:
        - department-owner:studio-operations
      personas:
        - infrastructure-maintainer
      rule: >-
        Environment reliability, backup, and operational changes require
        department-owner review when later acts activate the Studio Operations
        personas.
    low-observe-create:
      approvers:
        - department-owner:studio-operations
      personas:
        - analytics-reporter
        - support-responder
      rule: >-
        Reporting, response drafting, and support preparation may proceed in
        observe/create mode until later acts activate mutating Studio
        Operations execution surfaces.
