bounded_claims:
  supported:
    - studio-operations persona census and capability-family contract
    - approval and escalation semantics for studio-operations activation
    - registry-backed execution coverage for analytics-reporter (9 actions) and support-responder (8 actions)
    - deterministic pack-state projection with partial activation
  unsupported:
    - claims that finance-tracker, infrastructure-maintainer, or legal-compliance-checker are action-backed
    - live finance, compliance, or infrastructure mutations beyond later activation acts
    - HR, design, or engineering work outside the studio-operations contract
