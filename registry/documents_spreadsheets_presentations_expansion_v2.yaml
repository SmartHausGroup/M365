deterministic_rule: >
  E2EDocumentsSpreadsheetsPresentationsExpansion(action) = InstructionBacked(action)
  ∧ CapabilityRegistryImplemented(action) ∧ ExecutorRoute(action)=sharepoint
  ∧ AuthClass(action)=hybrid ∧ ApprovalProfile(action)=medium-operational.
supported_actions:
  create_document:
    canonical_action_key: sharepoint.document.create
    agent_alias: documents.create
    runtime_handler: GraphClient.upload_bytes + office_generation.generate_docx_bytes
    mutating: true
    result_shape_keys: [document, status]
    required_permissions: [Files.ReadWrite.All]
    approval_profile: medium-operational
    auth_class: hybrid
    capability_registry_alias: create_document
