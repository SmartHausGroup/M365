approval_profiles:
  low-observe-create:
    default_posture: "No approval for read, research, draft, or internal-prep work; department-owner approval for outbound publication, canonical asset changes, or external sharing."
  medium-operational:
    default_posture: "Department-owner approval for routine internal mutations; dual control for destructive, cross-department, or externally visible changes."
  high-impact:
    default_posture: "Human approval for all mutating actions with tenant, identity, public-facing, financial, or organization-wide impact; dual control for destructive or privileged changes."
  critical-regulated:
    default_posture: "Dual human approval and explicit sign-off for regulated, personnel-state, legal, security, or compliance-sensitive mutations."
coverage_statuses:
  registry-backed: "Persona has explicit allowed actions in registry/agents.yaml."
  persona-contract-only: "Persona exists in the authoritative roster but still needs later action-surface implementation."
