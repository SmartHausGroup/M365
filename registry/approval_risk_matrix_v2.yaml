schema_version: "2.0"
last_updated: "2026-03-21T00:20:00Z"
authority_inputs:
  universal_action_contract: registry/universal_action_contract_v2.yaml
  persona_map: registry/persona_capability_map.yaml
  agent_registry: registry/agents.yaml
deterministic_rule: >
  ApprovalRiskV2(agent, action, params) = ExactPolicy(action) ∨ PrefixPolicy(action) ∨ DomainDefault(Route(agent, action)).
risk_classes:
  low:
    meaning: "Read-only, inspect, or low-blast-radius work with no tenant-state mutation."
  medium:
    meaning: "Routine operational mutation with bounded blast radius and recoverable impact."
  high:
    meaning: "Privileged, externally visible, tenant-shaping, or identity-impacting mutation."
  critical:
    meaning: "Regulated, personnel-state, destructive, security-sensitive, or compliance-sensitive mutation."
approval_profiles:
  low-observe-create:
    required_human_approvals: 0
    default_posture: "No approval for read, research, draft, or internal-prep work; approval only when an exact or prefix policy marks the action as outward-facing or privileged."
  medium-operational:
    required_human_approvals: 1
    default_posture: "Department-owner approval for routine internal mutations when the action policy explicitly marks the mutation as approval-bearing."
  high-impact:
    required_human_approvals: 1
    default_posture: "Human approval for tenant, identity, public-facing, financial, or organization-wide changes; fail closed if approvers are missing."
  critical-regulated:
    required_human_approvals: 2
    default_posture: "Dual human approval and explicit sign-off for regulated, destructive, legal, personnel-state, security, or compliance-sensitive mutations."
