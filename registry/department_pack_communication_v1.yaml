department:
  id: communication
  display_name: Communication
  wave: W6
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Communication digital employees into one bounded department pack that reconciles to the staged post-H3 authoritative roster. David Park remains the only action-backed Communication anchor before later activation acts.
  bounded_claim: The Communication department pack may claim registry-backed execution coverage only for David Park. The remaining 3 promoted personas remain persona-contract-only with zero supported actions until later activation acts.
workflow_families:
- outbound_email_and_mailbox_campaigns
- meeting_and_followup_coordination
- campaign_launch_and_communication_operations
workload_families:
- Mail, calendar, contacts, and bookings
- Collaboration, meetings, and communities
- Media, publishing, and extended communications
- Tasks, scheduling, and work management
- Documents, notes, and workspace productivity
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the communication lead must intervene.
  blocked: An expected persona is missing, inactive, or outside the declared authority.
approval_model:
  department_owner: marketing-lead
  department_lead: department-lead:communication
  profiles:
    high-impact:
      approvers:
      - marketing-lead
      personas:
      - outreach-coordinator
      rule: Human approval is required for tenant, public-facing, financial, or organization-wide changes; destructive or privileged mutations remain explicitly gated.
    medium-operational:
      approvers:
      - marketing-lead
      personas:
      - email-processing-agent
      - teams-manager
      rule: Routine internal mutations require department-owner review; cross-department or externally visible changes remain gated until later activation acts widen the surface.
    low-observe-create:
      approvers:
      - marketing-lead
      personas:
      - calendar-management-agent
      rule: Draft, research, planning, and internal-preparation work may proceed in observe/create mode until later activation acts unlock mutating execution surfaces.
