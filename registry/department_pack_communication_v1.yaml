bounded_claims:
  supported:
  - communication persona census and capability-family contract
  - registry-backed execution coverage for all 4 declared communication personas
  - deterministic ready-pack projection without queue pressure
  - preservation of the certified partial-activation department taxonomy for downstream
    certification compatibility
  unsupported:
  - claims that any declared persona is outside the authoritative registry
  - mutation or activation beyond the explicit registry-backed action surface
  - department status rebasing beyond the preserved downstream certification taxonomy
