  twitter-engager:
    name: "Twitter Engager"
    department: "marketing"
    risk_tier: "low"
    allowed_actions: []

  # Product Department (3)
  sprint-prioritizer:
    name: "Sprint Prioritizer"
    department: "product"
    risk_tier: "low"
    allowed_actions: []

  feedback-synthesizer:
    name: "Feedback Synthesizer"
    department: "product"
    risk_tier: "low"
    allowed_actions: []

  trend-researcher:
    name: "Trend Researcher"
    department: "product"
