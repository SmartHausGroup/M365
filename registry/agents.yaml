    - users.read
    - users.create
    - users.update
    - users.disable
    - licenses.assign
    - groups.list
    - groups.get
    - groups.create
    - groups.add_member
    - groups.remove_member
    - groups.list_members
    - sites.list
    - sites.get
    - sites.root
    - sites.provision
    - lists.list
    - lists.get
    - lists.items
    - lists.create_item
    - files.list
    - files.get
    - files.search
    - files.create_folder
    - files.upload
    - files.share
