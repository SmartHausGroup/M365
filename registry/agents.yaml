    allowed_actions: []

  project-shipper:
    name: "Project Shipper"
    department: "project-management"
    risk_tier: "low"
    allowed_actions:
      - "list_plans"
      - "list_buckets"
      - "create_bucket"
      - "create_task"
      - "task.create"
      - "task.assign"
      - "deadline.track"
      - "status.update"
      - "report.generate"
    approval_rules:
      - action: "task.assign"
        condition: "estimated_hours > 40 OR priority == 'critical'"
        approvers: ["department-owner:project-management"]

  studio-producer:
    name: "Studio Producer"
    department: "project-management"
