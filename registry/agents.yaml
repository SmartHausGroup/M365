version: "1.0.0"
metadata:
  environment: "sandbox"
  last_updated: "2026-03-11"

agents:
  m365-administrator:
    name: "M365 Administrator"
    department: "operations"
    risk_tier: "high"
    allowed_actions:
      # User management
      - "users.list"
      - "users.read"
      - "users.create"
      - "users.update"
      - "users.disable"
      - "licenses.assign"
      # Group management
      - "groups.list"
      - "groups.get"
      - "groups.create"
      - "groups.add_member"
      - "groups.remove_member"
      - "groups.list_members"
      # SharePoint sites
      - "sites.list"
      - "sites.get"
      - "sites.root"
      - "sites.provision"
      - "lists.list"
      - "lists.get"
      - "lists.items"
      - "lists.create_item"
      # Files (OneDrive / SharePoint)
      - "files.list"
      - "files.get"
      - "files.search"
      - "files.create_folder"
      - "files.upload"
      - "files.share"
      - "drives.list"
      # Directory (Azure AD)
      - "directory.roles"
      - "directory.role_members"
      - "directory.domains"
      - "directory.org"
      - "apps.list"
      - "apps.get"
      - "apps.update"
      - "service_principals.list"
      # Legacy
      - "teams.create"
      - "teams.add_channel"
    approval_rules:
      - action: "users.create"
        approvers: ["global_admin"]
      - action: "users.update"
        approvers: ["global_admin"]
      - action: "users.disable"
        approvers: ["hr-team", "security-team"]
      - action: "groups.create"
        approvers: ["global_admin"]
      - action: "groups.add_member"
        approvers: ["global_admin"]
      - action: "teams.create"
        approvers: ["global_admin"]
      - action: "teams.add_channel"
        approvers: ["global_admin"]
      - action: "sites.provision"
        approvers: ["global_admin"]
      - action: "licenses.assign"
        approvers: ["global_admin"]

  website-manager:
    name: "Website Manager"
    department: "operations"
    risk_tier: "medium"
    allowed_actions:
      - "deployment.preview"
      - "deployment.production"
      - "content.update"
      - "content.create"
      - "analytics.read"
      - "seo.update"
    approval_rules:
      - action: "deployment.production"
        approvers: ["engineering-lead"]

  hr-generalist:
    name: "HR Generalist"
    department: "hr"
    risk_tier: "critical"
    allowed_actions:
      - "employee.onboard"
      - "employee.update_info"
      - "employee.offboard"
      - "policy.create"
      - "review.initiate"
    approval_rules:
      - action: "employee.offboard"
        approvers: ["hr-manager", "department-head"]

  outreach-coordinator:
    name: "Outreach Coordinator"
    department: "communication"
    risk_tier: "high"
    allowed_actions:
      - "email.send_individual"
      - "email.send_bulk"
      - "email.schedule"
      - "meeting.schedule"
      - "followup.create"
      - "campaign.create"
      # Graph API action (used via m365_email tool)
      - "mail.send"
    approval_rules:
      - action: "email.send_bulk"
        condition: "recipients > 100"
        approvers: ["marketing-lead"]

  project-manager:
    name: "Project Manager"
    department: "project-management"
    risk_tier: "medium"
    allowed_actions:
      - "create-project"
      - "list-projects"
      - "update-project-status"
      - "archive-project"

  platform-manager:
    name: "Platform Manager"
    department: "operations"
    risk_tier: "medium"
    allowed_actions:
      - "provision-client-services"
      - "deprovision-client-services"
      - "get-client-status"

  teams-manager:
    name: "Teams Manager"
    department: "collaboration"
    risk_tier: "medium"
    allowed_actions:
      # Graph API actions
      - "teams.list"
      - "teams.get"
      - "teams.create"
      - "teams.archive"
      - "teams.add_member"
      - "teams.remove_member"
      - "channels.list"
      - "channels.create"
      - "channels.send_message"
      - "chat.create"
      - "chat.send_message"
      - "chat.send"
      - "chat.list"
      # Legacy actions
      - "create-workspace"
      - "add-workspace-members"
      - "create-channels"
      - "get-team-status"
    approval_rules:
      - action: "teams.archive"
        approvers: ["it-director"]
      - action: "teams.remove_member"
        approvers: ["teams-admin"]

  # IT Operations Team
  it-operations-manager:
    name: "IT Operations Manager"
    department: "operations"
    risk_tier: "high"
    allowed_actions:
      - "infrastructure.monitor"
      - "system.health-check"
      - "alerts.respond"
      - "backup.verify"
      - "security.scan"
    approval_rules:
      - action: "security.scan"
        approvers: ["ciso"]

  website-operations-specialist:
    name: "Website Operations Specialist"
    department: "operations"
    risk_tier: "medium"
    allowed_actions:
      - "website.deploy"
      - "cdn.purge"
      - "dns.update"
      - "ssl.renew"
      - "performance.optimize"
      - "backup.restore"
    approval_rules:
      - action: "dns.update"
        approvers: ["it-director"]
      - action: "backup.restore"
        approvers: ["it-director"]

  # Agent Consultants (AI-Powered Internal Operations)
  email-processing-agent:
    name: "Email Processing Agent"
    department: "communication"
    risk_tier: "medium"
    allowed_actions:
      # Graph API actions (used by m365_email tool)
      - "mail.list"
      - "mail.read"
      - "mail.send"
      - "mail.reply"
      - "mail.forward"
      - "mail.move"
      - "mail.delete"
      - "mail.folders"
      - "mailbox.settings"
      # Business-level actions
      - "email.classify"
      - "email.respond"
      - "email.forward"
      - "email.archive"
      - "follow-up.schedule"
    approval_rules:
      - action: "email.respond"
        condition: "priority == 'high' OR contains_sensitive_info == true"
        approvers: ["legal", "compliance"]

  calendar-management-agent:
    name: "Calendar Management Agent"
    department: "operations"
    risk_tier: "low"
    allowed_actions:
      # Graph API actions (used by m365_calendar tool)
      - "calendar.list"
      - "calendar.create"
      - "calendar.get"
      - "calendar.update"
      - "calendar.delete"
      - "calendar.availability"
      # Legacy/business-level actions
      - "calendar.schedule"
      - "meeting.organize"
      - "availability.check"
      - "reminder.send"
      - "conflict.resolve"
    approval_rules:
      - action: "meeting.organize"
        condition: "attendees_count > 10 OR external_attendees > 0"
        approvers: ["executive-assistant"]

  project-coordination-agent:
    name: "Project Coordination Agent"
    department: "project-management"
    risk_tier: "medium"
    allowed_actions:
      # Business-level actions (used by m365_projects tool)
      - "task.create"
      - "task.assign"
      - "deadline.track"
      - "status.update"
      - "report.generate"
      # Planner actions (used by m365_planner tool)
      - "list_plans"
      - "create_plan"
      - "list_buckets"
      - "create_bucket"
      - "create_task"
    approval_rules:
      - action: "task.assign"
        condition: "estimated_hours > 40 OR priority == 'critical'"
        approvers: ["project-manager"]

  client-relationship-agent:
    name: "Client Relationship Agent"
    department: "crm"
    risk_tier: "medium"
    allowed_actions:
      - "client.follow-up"
      - "satisfaction.survey"
      - "feedback.analyze"
      - "relationship.score"
      - "engagement.plan"
    approval_rules:
      - action: "engagement.plan"
        condition: "client_value > 100000 OR relationship_risk == 'high'"
        approvers: ["account-manager"]

  compliance-monitoring-agent:
    name: "Compliance Monitoring Agent"
    department: "legal"
    risk_tier: "critical"
    allowed_actions:
      - "compliance.check"
      - "policy.validate"
      - "audit.prepare"
      - "violation.report"
      - "remediation.plan"
    approval_rules:
      - action: "violation.report"
        approvers: ["legal", "ciso"]

  recruitment-assistance-agent:
    name: "Recruitment Assistance Agent"
    department: "hr"
    risk_tier: "high"
    allowed_actions:
      - "candidate.screen"
      - "interview.schedule"
      - "feedback.collect"
      - "offer.prepare"
      - "onboarding.initiate"
    approval_rules:
      - action: "offer.prepare"
        condition: "salary > 150000 OR equity_grant > 0"
        approvers: ["hr-director", "ceo"]

  financial-operations-agent:
    name: "Financial Operations Agent"
    department: "finance"
    risk_tier: "critical"
    allowed_actions:
      - "invoice.process"
      - "expense.approve"
      - "budget.track"
      - "forecast.update"
      - "audit.prepare"
    approval_rules:
      - action: "expense.approve"
        condition: "amount > 5000 OR category == 'travel'"
        approvers: ["finance-director"]

  knowledge-management-agent:
    name: "Knowledge Management Agent"
    department: "operations"
    risk_tier: "low"
    allowed_actions:
      - "document.index"
      - "search.optimize"
      - "content.curate"
      - "training.recommend"
      - "expert.connect"

  # ---- UCP Administration ----
  ucp-administrator:
    name: "UCP Administrator"
    department: "governance"
    risk_tier: "critical"
    allowed_actions:
      # Tier management
      - "admin.list_tiers"
      - "admin.get_tier"
      - "admin.list_users"
      - "admin.get_user_tier"
      - "admin.set_user_tier"
      - "admin.remove_user_tier"
      # Tenant config
      - "admin.get_tenant_config"
      - "admin.reload_config"
      # Audit
      - "admin.audit_log"
    approval_rules:
      - action: "admin.set_user_tier"
        approvers: ["global_admin"]
      - action: "admin.remove_user_tier"
        approvers: ["global_admin"]

  # ---- NEW AGENTS (previously missing from registry) ----

  security-operations:
    name: "Security Operations"
    department: "security"
    risk_tier: "high"
    allowed_actions:
      - "security.alerts"
      - "security.alert_get"
      - "security.alert_update"
      - "security.incidents"
      - "security.incident_get"
      - "security.secure_score"
    approval_rules:
      - action: "security.alert_update"
        approvers: ["ciso", "security-team"]

  audit-operations:
    name: "Audit Operations"
    department: "security"
    risk_tier: "high"
    allowed_actions:
      - "audit.directory"
      - "audit.signins"
      - "audit.provisioning"

  service-health:
    name: "Service Health Monitor"
    department: "operations"
    risk_tier: "low"
    allowed_actions:
      - "health.overview"
      - "health.issues"
      - "health.issue_get"
      - "health.messages"

  identity-security:
    name: "Identity & Access Security"
    department: "security"
    risk_tier: "critical"
    allowed_actions:
      - "ca.policies"
      - "ca.policy_get"
      - "ca.policy_create"
      - "ca.policy_update"
      - "ca.policy_delete"
      - "ca.named_locations"
    approval_rules:
      - action: "ca.policy_create"
        approvers: ["ciso", "it-director"]
      - action: "ca.policy_update"
        approvers: ["ciso", "it-director"]
      - action: "ca.policy_delete"
        approvers: ["ciso", "it-director"]

  reports:
    name: "Reports & Analytics"
    department: "operations"
    risk_tier: "low"
    allowed_actions:
      - "reports.users_active"
      - "reports.email_activity"
      - "reports.teams_activity"
      - "reports.sharepoint_usage"
      - "reports.onedrive_usage"

  device-management:
    name: "Device Management"
    department: "operations"
    risk_tier: "medium"
    allowed_actions:
      - "devices.list"
      - "devices.get"
      - "devices.compliance"
      - "devices.actions"
    approval_rules:
      - action: "devices.actions"
        approvers: ["it-operations-manager"]

  # ---- SPECIALIST TEAM MEMBERS (no M365 actions yet) ----

  # Engineering Department (7)
  ai-engineer:
    name: "AI Engineer"
    department: "engineering"
    risk_tier: "medium"
    allowed_actions: []

  backend-architect:
    name: "Backend Architect"
    department: "engineering"
    risk_tier: "medium"
    allowed_actions:
      - "apps.list"
      - "apps.get"
      - "service_principals.list"
      - "sites.list"
      - "sites.get"
      - "lists.list"
      - "lists.get"
      - "lists.items"
      - "lists.create_item"
      - "files.list"
      - "files.get"
      - "files.search"
      - "drives.list"
    approval_rules:
      - action: "lists.create_item"
        approvers: ["department-owner:engineering"]

  devops-automator:
    name: "DevOps Automator"
    department: "engineering"
    risk_tier: "medium"
    allowed_actions:
      - "devices.list"
      - "devices.get"
      - "devices.compliance"
      - "health.overview"
      - "health.issues"
      - "health.issue_get"
      - "health.messages"
      - "reports.users_active"
      - "reports.email_activity"
      - "reports.teams_activity"
    approval_rules:
      - action: "devices.compliance"
        approvers: ["department-owner:engineering"]

  frontend-developer:
    name: "Frontend Developer"
    department: "engineering"
    risk_tier: "low"
    allowed_actions: []

  mobile-app-builder:
    name: "Mobile App Builder"
    department: "engineering"
