policies:
  throttling:
    global_rpm: 100
    burst_multiplier: 1.5

integrations:
  graph_api:
    license_aliases:
      E3: ["ENTERPRISEPACK", "SPE_E3", "M365_E3"]
      E5: ["ENTERPRISEPREMIUM", "SPE_E5", "M365_E5"]
      Developer: ["DEVELOPERPACK", "DEVELOPERPACK_E5", "M365_DEVELOPER"]
