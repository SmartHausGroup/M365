  capability_registry: registry/capability_registry.yaml

contract:
  id: workforce-packaging
  display_name: Workforce Packaging Contract v1
  status: contract-defined
  description: >
    Packages the final governed workforce offering into a deterministic product
    definition with explicit capability tiers, persona classes, department
    coverage, and bounded claims for customers after H5 activation closeout.

packaging_layers:
  - order: 1
    id: capability_tier_definition
    description: >
      Define the capability tiers available to customers based on the final
      certified M365-backed activated surface and routed actions.
    outputs:
      - tier definitions with action counts and domain coverage
    failure_mode: >
      Missing tier definition or overclaimed capability fails packaging.

  - order: 2
    id: persona_class_packaging
    description: >
      Package personas into customer-facing classes: active (registry-backed
      with implemented actions) and deferred external (contract-only, non-live).
    outputs:
      - persona class definitions with counts and capability summaries
    failure_mode: >
      Persona class claiming action capability for deferred external personas fails.

  - order: 3
    id: department_coverage_matrix
    description: >
      Define the department coverage matrix showing that all 10 departments
      have active M365-backed personas while only marketing retains deferred
      external specialists.
    outputs:
      - department coverage matrix with active and deferred counts
    failure_mode: >
      Department coverage diverging from the authoritative registry fails.

  - order: 4
    id: product_boundary_lock
    description: >
      Lock the product boundary with explicit supported and unsupported claims
      derived from the final activated persona surface evidence.
    outputs:
      - product boundary document with versioned claims
    failure_mode: >
      Product claim exceeding activated-surface evidence fails boundary lock.

governance_rules:
  fail_closed:
    description: >
      Any packaging claim that exceeds the final activated-surface evidence is rejected.
  audit_completeness:
    description: >
      Packaging decisions produce traceable evidence back to certification.
  bounded_claims:
    description: >
      Customer-facing claims must not exceed the final certified action surface.
  determinism:
    description: >
      Same certification evidence produces the same packaging output.
  traceability:
    description: >
      Every packaged capability traces to a specific certification layer.

