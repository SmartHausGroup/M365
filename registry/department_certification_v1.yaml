contract:
  id: department-certification
  display_name: Department Certification Contract v1
  status: contract-defined
  description: >
    Defines the deterministic certification criteria for each department pack
    against its target workflows and responsibilities. Every department must
    have a valid pack, correct staged persona counts, consistent workflow and
    workload families, and bounded-claim alignment before H5 activation
    closeout may proceed.

certification_phases:
  - order: 1
    id: pack_presence
    description: >
      Verify every department has a corresponding pack YAML file in the
      registry with required root keys.
    inputs:
      - registry/department_pack_*_v1.yaml
    outputs:
      - per-department pack presence status (pass/fail)
    failure_mode: >
      Department without a pack file or with missing root keys fails
      pack presence.

  - order: 2
    id: persona_count_alignment
    description: >
      Verify each department pack's persona count matches the personas
      assigned to that department in the authoritative persona registry.
    inputs:
      - department_pack_*_v1.yaml
      - persona_registry_v2.yaml
    outputs:
      - per-department persona count alignment status
    failure_mode: >
      Department pack with persona count mismatch fails alignment.

  - order: 3
    id: workflow_family_coverage
    description: >
      Verify each department pack declares at least one workflow family
      and at least one workload family.
    inputs:
      - department_pack_*_v1.yaml
    outputs:
      - per-department workflow family coverage status
    failure_mode: >
      Department pack with zero workflow or workload families fails coverage.

  - order: 4
    id: bounded_claim_consistency
    description: >
      Verify no department pack claims capabilities beyond its declared
      personas and workflow families.
    inputs:
      - all certification phase outputs
    outputs:
      - per-department certification verdict
    failure_mode: >
      Department claiming certification beyond its declared surface fails.

governance_rules:
  fail_closed:
    description: >
      Any department that fails any certification phase must be marked
      not-certified.
  audit_completeness:
    description: >
      Every certification attempt produces a per-department evidence record.
  bounded_claims:
    description: >
      Certification verdicts must not exceed the actual department surface.
      Partial-activation departments must not claim full activation before H5.
  determinism:
    description: >
      Same packs plus same registry must produce the same verdicts on replay.
  exhaustive_coverage:
    description: >
      All 10 departments must have packs. No department may be uncertified
      by omission.

