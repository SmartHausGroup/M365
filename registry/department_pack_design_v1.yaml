bounded_claims:
  supported:
    - design persona census and capability-family contract
    - approval and escalation semantics for future design activation
    - deterministic blocked-state projection while design remains contract-only
  unsupported:
    - claims that design personas are currently action-backed
    - live brand, UI, UX, visual, or delight mutations beyond later activation acts
    - HR, engineering, or testing work outside the design contract
