department:
  id: design
  display_name: Design
  wave: W7
  wave_track: Wave A
  status: registry-backed
  purpose: Package the Design digital employees into one bounded department pack that truthfully reflects the fully action-backed authoritative roster after H3 and H4S.
  bounded_claim: The Design department pack may claim registry-backed execution coverage only for Isabella Rossi, Noah Anderson, Mila Novak, Diego Alvarez, Luna Park and only across the explicit supported actions declared in this authority.
workflow_families:
- brand_governance_and_consistency
- interface_design_and_component_specs
- user_research_and_insight_capture
- visual_narrative_and_creative_production
workload_families:
- Media, publishing, and extended communications
- Content, intranet, and files
- Knowledge, search, and employee experience
- Documents, notes, and workspace productivity
- Mail, calendar, contacts, and bookings
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the design lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:design
  department_lead: department-lead:design
  profiles:
    low-observe-create:
      approvers:
      - department-owner:design
      personas:
      - brand-guardian
      - ui-designer
      - ux-researcher
      - visual-storyteller
      - whimsy-injector
      rule: Brand review, UI design, UX research, visual storytelling, and delight design may proceed in observe/create mode until later acts activate mutating Design execution surfaces.
