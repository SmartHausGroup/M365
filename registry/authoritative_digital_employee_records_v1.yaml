contract:
  id: authoritative-digital-employee-records
  display_name: Authoritative Digital Employee Records v1
  status: contract-defined
  description: >
    Defines the bounded named employee-record authority for the 20 promoted
    personas before any authoritative registry rebase or activation. Every
    record must include the canonical agent binding, title, department,
    manager token, escalation token, and exactly three bounded style fields.
required_fields:
  - canonical_agent
  - display_name
  - slug
  - department
  - title
  - manager
  - escalation_owner
  - working_style
  - communication_style
  - decision_style
bounded_humanization_fields:
  - working_style
  - communication_style
  - decision_style
summary:
  total_promoted_personas: 20
  departments_covered: 7
  manager_token_policy: department-lead:<department>
  escalation_token_policy: department-owner:<department>
department_distribution:
  operations: 8
  hr: 1
  communication: 3
  engineering: 1
  marketing: 1
  project-management: 2
  studio-operations: 4
