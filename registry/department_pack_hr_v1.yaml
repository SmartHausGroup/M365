  persona_memory: registry/persona_memory_work_history_v1.yaml
  runtime: src/smarthaus_common/department_pack.py
department:
  id: hr
  display_name: Human Resources
  wave: W6
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Human Resources digital employees into one bounded department pack that reconciles to the staged post-H3 authoritative roster. Sarah Williams remains the only action-backed HR anchor while recruiting support stays contract-only.
  bounded_claim: The Human Resources department pack may claim registry-backed execution coverage only for Sarah Williams. The remaining 1 promoted personas remain persona-contract-only with zero supported actions until later activation acts.
workflow_families:
- onboarding_and_offboarding
- employee_record_and_policy_administration
- review_cycle_and_case_coordination
- recruitment_and_candidate_coordination
workload_families:
- Identity, directory, and tenant administration
- Documents, notes, and workspace productivity
- Tasks, scheduling, and work management
- Security, compliance, and data governance
- Mail, calendar, contacts, and bookings
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the HR lead must intervene.
  blocked: An expected persona is missing, inactive, or outside the declared authority.
approval_model:
  department_owner: hr-manager
  department_lead: department-lead:hr
  profiles:
    critical-regulated:
      approvers:
      - hr-manager
      personas:
      - hr-generalist
      rule: Dual human approval and explicit sign-off are required for regulated, personnel-state, legal, security, or compliance-sensitive mutations.
    high-impact:
      approvers:
      - hr-manager
      personas:
      - recruitment-assistance-agent
      rule: Human approval is required for tenant, public-facing, financial, or organization-wide changes; destructive or privileged mutations remain explicitly gated.
kpis:
  required_personas: 2
  required_active_personas: 1
  required_registry_backed_personas: 1
  required_workflow_families: 4
  supported_action_count: 5
personas:
  hr-generalist:
    display_name: Sarah Williams
    title: HR Director
    role_type: department_anchor
    coverage_status: registry-backed
    risk_tier: critical
    approval_profile: critical-regulated
    capability_families:
    - onboarding and offboarding
    - employee record updates
    - review orchestration
    - HR policy lifecycle
    workload_families:
    - Identity, directory, and tenant administration
    - Documents, notes, and workspace productivity
    - Tasks, scheduling, and work management
    - Security, compliance, and data governance
    workflow_families:
    - onboarding_and_offboarding
    - employee_record_and_policy_administration
    - review_cycle_and_case_coordination
    supported_actions:
    - employee.onboard
    - employee.update_info
    - employee.offboard
    - policy.create
    - review.initiate
  recruitment-assistance-agent:
    display_name: Camila Torres
    title: Recruiting Coordinator
    role_type: recruiting_operator
    coverage_status: persona-contract-only
    risk_tier: high
    approval_profile: high-impact
    capability_families:
    - candidate screening
    - interview coordination
    - offer and onboarding preparation
    workload_families:
    - Tasks, scheduling, and work management
    - Mail, calendar, contacts, and bookings
    - Documents, notes, and workspace productivity
    workflow_families:
    - recruitment_and_candidate_coordination
    - onboarding_and_offboarding
    supported_actions: []
bounded_claims:
  supported:
  - hr persona census and capability-family contract
  - approval and escalation semantics for staged hr activation
  - registry-backed execution coverage only for Sarah Williams
  - deterministic pack-state projection while planned personas remain fail-closed
  unsupported:
  - claims that planned hr personas are action-backed
  - mutation or activation beyond the explicitly registry-backed persona set
  - cross-department work outside the hr contract
