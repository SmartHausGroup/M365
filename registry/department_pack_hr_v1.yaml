version: 1.0.0
last_updated: '2026-04-06T12:00:00Z'
authority:
  persona_registry: registry/persona_registry_v2.yaml
  persona_capability_map: registry/persona_capability_map.yaml
  persona_accountability: registry/persona_accountability_v1.yaml
  persona_memory: registry/persona_memory_work_history_v1.yaml
  runtime: src/smarthaus_common/department_pack.py
department:
  id: hr
  display_name: Human Resources
  wave: W6
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Human Resources digital employees into one bounded department
    pack that reconciles to the final post-H5 source-branch authoritative roster while
    preserving the certified partial-activation department taxonomy required by downstream
    certification surfaces.
  bounded_claim: The Human Resources department pack may claim registry-backed execution
    coverage for all 2 department personas in the authoritative registry. The default
    pack state is ready without queue pressure; department.status remains partial-activation
    by design for downstream certification compatibility.
workflow_families:
- onboarding_and_offboarding
- employee_record_and_policy_administration
- review_cycle_and_case_coordination
- recruitment_and_candidate_coordination
workload_families:
- Identity, directory, and tenant administration
- Documents, notes, and workspace productivity
- Tasks, scheduling, and work management
- Security, compliance, and data governance
- Mail, calendar, contacts, and bookings
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the HR lead must
    intervene.
  blocked: An expected persona is missing, inactive, or outside the declared authority.
approval_model:
  department_owner: hr-manager
  department_lead: department-lead:hr
  profiles:
    critical-regulated:
      approvers:
      - hr-manager
      personas:
      - hr-generalist
      rule: Dual human approval and explicit sign-off are required for regulated,
        personnel-state, legal, security, or compliance-sensitive mutations.
    high-impact:
      approvers:
      - hr-manager
      personas:
      - recruitment-assistance-agent
      rule: Human approval is required for tenant, public-facing, financial, or organization-wide
        changes; destructive or privileged mutations remain explicitly gated.
kpis:
  required_personas: 2
  required_active_personas: 2
  required_registry_backed_personas: 2
  required_workflow_families: 4
  supported_action_count: 10
personas:
  hr-generalist:
    display_name: Sarah Williams
    title: HR Director
    role_type: department_anchor
    coverage_status: registry-backed
    risk_tier: critical
    approval_profile: critical-regulated
    capability_families:
    - onboarding and offboarding
    - employee record updates
    - review orchestration
    - HR policy lifecycle
    workload_families:
    - Identity, directory, and tenant administration
    - Documents, notes, and workspace productivity
    - Tasks, scheduling, and work management
    - Security, compliance, and data governance
    workflow_families:
    - onboarding_and_offboarding
    - employee_record_and_policy_administration
    - review_cycle_and_case_coordination
    supported_actions:
    - employee.onboard
    - employee.update_info
    - employee.offboard
    - policy.create
    - review.initiate
  recruitment-assistance-agent:
    display_name: Camila Torres
    title: Recruiting Coordinator
    role_type: recruiting_operator
    coverage_status: registry-backed
    risk_tier: high
    approval_profile: high-impact
    capability_families:
    - candidate screening
    - interview coordination
    - offer and onboarding preparation
    workload_families:
    - Tasks, scheduling, and work management
    - Mail, calendar, contacts, and bookings
    - Documents, notes, and workspace productivity
    workflow_families:
    - recruitment_and_candidate_coordination
    - onboarding_and_offboarding
    supported_actions:
    - candidate.screen
    - interview.schedule
    - feedback.collect
    - offer.prepare
    - onboarding.initiate
bounded_claims:
  supported:
  - human resources persona census and capability-family contract
  - registry-backed execution coverage for all 2 declared human resources personas
  - deterministic ready-pack projection without queue pressure
  - preservation of the certified partial-activation department taxonomy for downstream
    certification compatibility
  unsupported:
  - claims that any declared persona is outside the authoritative registry
  - mutation or activation beyond the explicit registry-backed action surface
  - department status rebasing beyond the preserved downstream certification taxonomy
