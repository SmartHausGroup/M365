schema_version: "2.0"
last_updated: "2026-03-21T03:30:00Z"
authority_inputs:
  - docs/CAIO_M365_CONTRACT.md
  - docs/contracts/caio-m365/ACTION_SPECIFICATION.md
  - docs/contracts/M365_CAPABILITIES_UNIVERSE.md
  - registry/capability_registry.yaml
  - registry/executor_routing_v2.yaml
  - registry/auth_model_v2.yaml
  - registry/approval_risk_matrix_v2.yaml
deterministic_rule: >
  E3CPowerBIExpansion(action) = InstructionBacked(action) ∧ CapabilityRegistryImplemented(action)
  ∧ ExecutorRoute(action)=powerplatform ∧ AuthClass(action)=app_only.
supported_actions:
  list_powerbi_workspaces:
    canonical_action_key: powerplatform.powerbi_workspace.list
    agent_alias: powerbi.workspace.list
    runtime_handler: PowerBIClient.list_workspaces
    mutating: false
    result_shape_keys: [workspaces, count]
    required_permissions: [PowerBI.Read.All]
    approval_profile: low-observe-create
    capability_registry_alias: list_powerbi_workspaces
  get_powerbi_workspace:
    canonical_action_key: powerplatform.powerbi_workspace.read
    agent_alias: powerbi.workspace.get
    runtime_handler: PowerBIClient.get_workspace
    mutating: false
    result_shape_keys: [workspace]
    required_permissions: [PowerBI.Read.All]
    approval_profile: low-observe-create
    capability_registry_alias: get_powerbi_workspace
