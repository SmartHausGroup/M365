    workload_family: "Identity, directory, and tenant administration"
    capability_family: "user lifecycle and directory lookup"
    resource: user
    operation: list
    mutating: false
    implementation_status: certified-core
    executor_domain: directory
    auth_class: app_only
    risk_class: low
    approval_profile: low-observe-create
    required_permissions: [User.Read.All]
    input_contract:
      required: []
      optional: [top, select]
    result_contract:
