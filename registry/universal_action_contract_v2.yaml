schema_version: "2.0"
last_updated: "2026-03-20T21:15:00Z"
authority_inputs:
  roster: registry/ai_team.json
  persona_map: registry/persona_capability_map.yaml
  capability_registry: registry/capability_registry.yaml
  agent_registry: registry/agents.yaml
  caio_contract: docs/CAIO_M365_CONTRACT.md
  caio_action_spec: docs/contracts/caio-m365/ACTION_SPECIFICATION.md
deterministic_rule: >
  UniversalActionV2 = Identity × Semantics × Execution × Governance × Evidence.
contract_dimensions:
  identity:
    required_fields:
      - action_key
      - workload_family
      - capability_family
      - resource
      - operation
      - aliases
  semantics:
    required_fields:
      - mutating
      - input_contract
      - result_contract
      - idempotency_support
      - implementation_status
  execution:
    required_fields:
      - executor_domain
      - auth_class
      - required_permissions
  governance:
    required_fields:
      - risk_class
      - approval_profile
      - allowed_persona_classes
  evidence:
    required_fields:
      - source_surfaces
      - evidence_refs
canonical_action_key:
  syntax: "<executor_domain>.<resource>.<operation>"
  regex: "^[a-z0-9_]+\\.[a-z0-9_]+\\.[a-z0-9_]+$"
  normalization_rules:
    - "lower-case only"
    - "exactly three dot-separated segments"
    - "resource segment is singular"
    - "operation segment may use underscores but not additional dots"
executor_domains:
  - directory
  - collaboration
  - sharepoint
  - messaging
  - workmanagement
  - knowledge
  - powerplatform
  - security
  - devices
  - publishing
  - composite
auth_classes:
  - app_only
  - delegated
  - hybrid
  - mixed
risk_classes:
  - low
  - medium
  - high
  - critical
implementation_statuses:
  - certified-core
  - registry-backed
  - docs-backed
  - planned-only
request_envelope_v2:
  required_fields:
    - action_key
    - params
  optional_fields:
    - persona_id
    - requestor
    - executor_hint
    - idempotency_key
    - correlation_id
    - evidence_mode
  rules:
    - "action_key must be canonical; legacy aliases resolve before execution"
    - "params must be a JSON object"
    - "idempotency_key is required for mutating actions in external orchestration paths"
response_envelope_v2:
  required_fields:
    - ok
    - result
    - error
    - trace_id
    - action_key
  optional_fields:
    - executor_domain
    - auth_class
    - approval_required
    - evidence_refs
projection_rules:
  from_caio_instruction:
    source_shape: "{ action: <snake_case>, params: {...} }"
    rule: "resolve snake_case action alias to canonical action_key, preserve params, then execute against v2 envelope"
  from_capability_registry:
    source_shape: "action rows keyed by snake_case action"
    rule: "treat capability_registry action as a legacy alias source for canonical action definitions"
  from_agent_registry:
    source_shape: "allowed_actions strings, mostly dotted"
    rule: "treat agent-registry action strings as persona-facing aliases that must resolve to canonical action_key before routing"
minimum_action_definition:
  required_fields:
    - action_key
    - aliases
    - workload_family
    - capability_family
    - resource
    - operation
    - mutating
    - implementation_status
    - executor_domain
    - auth_class
    - risk_class
    - approval_profile
    - required_permissions
    - input_contract
    - result_contract
    - source_surfaces
    - evidence_refs
