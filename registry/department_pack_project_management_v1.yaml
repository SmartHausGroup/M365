department:
  id: project-management
  display_name: Project Management
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Project Management digital employees into one bounded department pack that reconciles to the staged post-H3 authoritative roster. Ben Foster, Emily Carter, and Olivia Park remain the action-backed Project Management anchors.
  bounded_claim: The Project Management department pack may claim registry-backed execution coverage only for Emily Carter, Ben Foster, Olivia Park. The remaining 2 promoted personas remain persona-contract-only with zero supported actions until later activation acts.
workflow_families:
- release_coordination_and_handoff_management
- experiment_tracking_and_status_reporting
- cross_functional_schedule_and_delivery_planning
workload_families:
- Tasks, scheduling, and work management
- Collaboration, meetings, and communities
- Documents, notes, and workspace productivity
- Low-code, workflow, and analytics
- Knowledge, search, and employee experience
- Content, intranet, and files
- Media, publishing, and extended communications
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the project-management lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:project-management
  department_lead: department-lead:project-management
  profiles:
    medium-operational:
      approvers:
      - department-owner:project-management
      personas:
      - project-coordination-agent
      - project-manager
      - project-shipper
      rule: Routine internal mutations require department-owner review; cross-department or externally visible changes remain gated until later activation acts widen the surface.
    low-observe-create:
      approvers:
      - department-owner:project-management
      personas:
      - experiment-tracker
      - studio-producer
      rule: Draft, research, planning, and internal-preparation work may proceed in observe/create mode until later activation acts unlock mutating execution surfaces.
