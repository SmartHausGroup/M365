authority:
  persona_registry: registry/persona_registry_v2.yaml
  persona_capability_map: registry/persona_capability_map.yaml
  persona_accountability: registry/persona_accountability_v1.yaml
  persona_memory: registry/persona_memory_work_history_v1.yaml
  runtime: src/smarthaus_common/department_pack.py
department:
  id: project-management
  display_name: Project Management
  wave: W7
  wave_track: Wave A
  status: persona-contract-only
  purpose: >-
    Package the Project Management digital employees into one bounded department
    contract covering release coordination, experiment tracking, and
    cross-functional production planning responsibilities that are defined but
    not yet action-backed.
  bounded_claim: >-
    The Project Management department pack may only claim the authoritative
    contract personas, capability families, approval posture, and blocked
    readiness state declared here. It may not claim implemented release,
    scheduling, or production execution coverage until later acts activate
    those personas.
workflow_families:
  - release_coordination_and_handoff_management
  - experiment_tracking_and_status_reporting
  - cross_functional_schedule_and_delivery_planning
workload_families:
  - Tasks, scheduling, and work management
  - Collaboration, meetings, and communities
  - Documents, notes, and workspace productivity
  - Low-code, workflow, and analytics
  - Knowledge, search, and employee experience
  - Content, intranet, and files
  - Media, publishing, and extended communications
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the project-management lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:project-management
  department_lead: department-lead:project-management
  profiles:
    medium-operational:
      approvers:
        - department-owner:project-management
      personas:
        - project-shipper
      rule: >-
        Release coordination, handoff orchestration, and launch-checklist
        changes require department-owner review when later acts activate the
        Project Management personas.
    low-observe-create:
      approvers:
        - department-owner:project-management
      personas:
        - experiment-tracker
        - studio-producer
      rule: >-
        Experiment logging, production planning, and scheduling preparation may
        proceed in observe/create mode until later acts activate mutating
        Project Management execution surfaces.
kpis:
  required_personas: 3
  required_active_personas: 0
  required_registry_backed_personas: 0
  required_workflow_families: 3
  supported_action_count: 0
personas:
  experiment-tracker:
    display_name: Emily Carter
    title: Experimentation PM
    role_type: planning_operator
    coverage_status: persona-contract-only
    risk_tier: low
    approval_profile: low-observe-create
    capability_families:
      - experiment tracking
      - KPI logging
      - status reporting
    workload_families:
      - Tasks, scheduling, and work management
      - Low-code, workflow, and analytics
      - Knowledge, search, and employee experience
    workflow_families:
      - experiment_tracking_and_status_reporting
    supported_actions: []
  project-shipper:
    display_name: Ben Foster
    title: Release Manager
    role_type: release_anchor
    coverage_status: persona-contract-only
    risk_tier: low
    approval_profile: medium-operational
    capability_families:
      - release coordination
      - handoff orchestration
      - launch checklist management
    workload_families:
      - Tasks, scheduling, and work management
      - Collaboration, meetings, and communities
      - Content, intranet, and files
    workflow_families:
      - release_coordination_and_handoff_management
      - cross_functional_schedule_and_delivery_planning
    supported_actions: []
  studio-producer:
    display_name: Olivia Park
    title: Studio Producer
    role_type: planning_operator
    coverage_status: persona-contract-only
    risk_tier: low
    approval_profile: low-observe-create
    capability_families:
      - cross-functional production planning
      - schedule coordination
      - creative delivery tracking
    workload_families:
      - Tasks, scheduling, and work management
      - Collaboration, meetings, and communities
      - Media, publishing, and extended communications
    workflow_families:
      - cross_functional_schedule_and_delivery_planning
    supported_actions: []
bounded_claims:
  supported:
    - project-management persona census and capability-family contract
    - approval and escalation semantics for future project-management activation
    - deterministic blocked-state projection while project-management remains contract-only
  unsupported:
    - claims that project-management personas are currently action-backed
    - live release mutations, launch execution, or experiment-state changes beyond later activation acts
    - engineering, marketing, or finance work outside the project-management contract
