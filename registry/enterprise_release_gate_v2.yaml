contract:
  id: enterprise-release-gate-v2
  display_name: Enterprise Release Gate v2
  status: contract-defined
  description: >
    Closes the formal workforce release gate with final post-H5 evidence and explicit
    sign-off by aggregating all four certification layers (workload, persona,
    department, cross-department) into a single deterministic release decision.
    The gate is GO for the final governed certification state while preserving
    bounded residual gaps for uncertified executor domains and deferred
    external-platform personas.

release_gate_checks:
  - order: 1
    id: workload_certification_green
    description: >
      Verify E8A workload certification contract exists and its overall
      verdict supports the release claim.
    evidence_source: registry/workload_certification_v1.yaml
    required_verdict: "13 of 15 domains certified"
    status: green

  - order: 2
    id: persona_certification_green
    description: >
      Verify persona certification exists and all 59 personas pass final
      post-H5 certification with only the 5 deferred external-platform roles
      remaining planned and contract-only.
    evidence_source: registry/persona_certification_v1.yaml
    required_verdict: "59 personas certified"
    status: green

  - order: 3
    id: department_certification_green
    description: >
      Verify department certification exists and all 10 departments pass
      certification against the final post-H5 authoritative roster while
      preserving the current department-pack status taxonomy.
    evidence_source: registry/department_certification_v1.yaml
    required_verdict: "10 departments certified"
    status: green

  - order: 4
    id: cross_department_certification_green
    description: >
      Verify E8D cross-department certification contract exists and
      overall verdict is certified.
    evidence_source: registry/cross_department_certification_v1.yaml
    required_verdict: "cross-department workflows certified"
    status: green

  - order: 5
    id: governance_layer_complete
    description: >
      Verify the UCP delegation contract and executive oversight contract
      exist as governance prerequisites.
    evidence_sources:
      - registry/ucp_delegation_contract_v1.yaml
      - registry/executive_oversight_contract_v1.yaml
    required_verdict: "governance layer contracts present"
    status: green

  - order: 6
    id: release_decision
    description: >
      Aggregate all gate checks into a single release decision.
      All checks must be green for a GO decision.
    required_verdict: "all gate checks green"
    status: green

governance_rules:
  fail_closed:
    description: >
      Any gate check not green forces a NO-GO release decision.
  audit_completeness:
    description: >
      The release gate produces an evidence record for each check.
  bounded_claims:
    description: >
      The release decision cannot claim coverage beyond what the
      individual certifications support.
  determinism:
    description: >
      Same certification contracts produce the same release decision.
  explicit_sign_off:
    description: >
      The release gate is a formal governance artifact that requires
      explicit acknowledgment before the program may claim complete
      final workforce certification.

kpis:
  release_gate_check_count: 6
  governance_rule_count: 5
  workload_domains_certified: 13
  workload_domains_not_yet: 2
  personas_certified: 59
  active_personas_certified: 54
  planned_personas_certified: 5
  departments_certified: 10
  total_routed_actions: 430

release_decision:
  verdict: GO
  conditions:
    - "13 of 15 workload domains certified (2 domains have zero routed actions)"
    - "All 59 personas certified in the final post-H5 state (54 registry-backed active, 5 contract-only deferred external planned)"
    - "All 10 departments certified with 59 personas correctly distributed"
    - "Activated-surface and packaging contracts reconcile to 430 total routed actions"
    - "Cross-department workflows certified through collaboration contract"
    - "Governance layer (UCP delegation + executive oversight) is present"
  residual_gaps:
    - "2 executor domains (workmanagement, publishing) have zero routed actions"
    - "5 of 59 personas are deferred external-platform marketing roles without implemented actions"
    - "Department pack status fields remain the bounded H4S taxonomy and are not reclassified in this phase"
    - "Cross-department workflows are contract-certified, not live-executed"
  sign_off_required_from:
    - engineering
    - security
    - release-owner

bounded_claims:
  supported:
    - "The workforce expansion program has completed its four-layer certification for the final post-H5 state"
    - "The release gate is GO with documented residual gaps"
    - "All certification artifacts are deterministic and replay-stable"
  not_supported:
    - "All 15 executor domains are fully certified"
    - "All 59 personas have implemented actions"
    - "All 59 personas are active"
    - "Live tenant execution evidence for the complete workforce"
    - "Release is unconditional (residual gaps exist)"
