department:
  id: product
  display_name: Product
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Product digital employees into one bounded department contract covering backlog prioritization, insight
    synthesis, and market research responsibilities that are defined but not yet action-backed.
  bounded_claim: The Product department pack may only claim the authoritative contract personas, capability families, approval
    posture, and blocked readiness state declared here. It may not claim implemented planning, prioritization, or research
    execution coverage until later acts activate those personas.
workflow_families:
- backlog_planning_and_prioritization
- feedback_synthesis_and_insight_briefing
- market_research_and_opportunity_analysis
workload_families:
- Tasks, scheduling, and work management
- Knowledge, search, and employee experience
- Low-code, workflow, and analytics
- Collaboration, meetings, and communities
- Mail, calendar, contacts, and bookings
- Documents, notes, and workspace productivity
- Media, publishing, and extended communications
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the product lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:product
  department_lead: department-lead:product
  profiles:
    low-observe-create:
      approvers:
      - department-owner:product
      personas:
      - sprint-prioritizer
      - feedback-synthesizer
      - trend-researcher
      rule: Planning, synthesis, and research preparation may proceed in observe/create mode until later acts activate mutating
        Product execution surfaces.
kpis:
  required_personas: 3
  required_active_personas: 3
  required_registry_backed_personas: 3
  required_workflow_families: 3
  supported_action_count: 22
