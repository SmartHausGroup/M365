bounded_claims:
  supported:
  - product persona census and capability-family contract
  - approval and escalation semantics for future product activation
  - deterministic blocked-state projection while product remains contract-only
  unsupported:
  - claims that product personas are currently action-backed
  - live backlog mutation, roadmap execution, or research publication beyond later activation acts
  - engineering, finance, or HR work outside the product contract
