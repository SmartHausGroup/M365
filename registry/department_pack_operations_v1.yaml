department:
  id: operations
  display_name: Operations
  wave: W6
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Operations digital employees into one bounded department pack
    that reconciles to the final post-H5 source-branch authoritative roster while
    preserving the certified partial-activation department taxonomy required by downstream
    certification surfaces.
  bounded_claim: The Operations department pack may claim registry-backed execution
    coverage for all 10 department personas in the authoritative registry. The default
    pack state is ready without queue pressure; department.status remains partial-activation
    by design for downstream certification compatibility.
workflow_families:
- identity_access_lifecycle
- workspace_provisioning_and_administration
- sharepoint_site_list_file_administration
- website_content_publication
- analytics_and_seo_change_management
- audit_and_signin_evidence_review
- compliance_monitoring_and_remediation
- endpoint_and_device_operations
- conditional_access_and_identity_hardening
- infrastructure_reliability_and_alert_response
- security_incident_and_secure_score_monitoring
- service_health_and_message_center_tracking
- control_plane_governance_and_audit_review
workload_families:
- Identity, directory, and tenant administration
- Collaboration, meetings, and communities
- Content, intranet, and files
- Media, publishing, and extended communications
- Low-code, workflow, and analytics
- Security, compliance, and data governance
- Devices, endpoint management, and adjacent Windows admin surfaces
- Knowledge, search, and employee experience
- Tasks, scheduling, and work management
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the department lead
    must intervene.
  blocked: An expected persona is missing, inactive, or outside the declared authority.
approval_model:
  department_owner: department-owner:operations
  department_lead: department-lead:operations
  profiles:
    critical-regulated:
      approvers:
      - department-owner:operations
      personas:
      - compliance-monitoring-agent
      - identity-security
      - ucp-administrator
      rule: Dual human approval and explicit sign-off are required for regulated,
        personnel-state, legal, security, or compliance-sensitive mutations.
    high-impact:
      approvers:
      - department-owner:operations
      personas:
      - audit-operations
      - it-operations-manager
      - m365-administrator
      - security-operations
      rule: Human approval is required for tenant, public-facing, financial, or organization-wide
        changes; destructive or privileged mutations remain explicitly gated.
    medium-operational:
      approvers:
      - department-owner:operations
      personas:
      - device-management
      - website-manager
      rule: Routine internal mutations require department-owner review; cross-department
        or externally visible changes remain gated within the declared approval model
        and explicit action surface.
    low-observe-create:
      approvers:
      - department-owner:operations
      personas:
      - service-health
      rule: Draft, research, planning, and low-risk preparation work may proceed in
        observe/create mode within the declared action surface and approval model.
