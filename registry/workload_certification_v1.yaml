contract:
  id: workload-certification
  display_name: Workload Certification Contract v1
  status: contract-defined
  description: >
    Defines the deterministic certification criteria for each executor domain
    against the live tenant and the bounded executor model. Each workload
    surface must pass schema validation, action routing coverage, auth posture
    alignment, and bounded-claim consistency before the domain can be marked
    certified.

certification_phases:
  - order: 1
    id: schema_validation
    description: >
      Verify each executor domain has a valid entry in the routing table
      with at least one mapped action and declared auth requirements.
    inputs:
      - executor_routing_v2.yaml
      - universal_action_contract_v2.yaml
    outputs:
      - per-domain schema status (pass/fail)
    failure_mode: >
      Domain missing from routing table or has zero mapped actions fails
      schema validation.

  - order: 2
    id: action_coverage_audit
    description: >
      For each executor domain, count the routed actions and compare against
      the capability registry to determine coverage percentage.
    inputs:
      - executor_routing_v2.yaml
      - capability_registry.yaml
    outputs:
      - per-domain action count
      - per-domain coverage ratio
    failure_mode: >
      Domain with zero routed actions or missing capability registry entries
      fails the coverage audit.

  - order: 3
    id: auth_posture_alignment
    description: >
      Verify each routed action's required permissions are declared in the
      auth model and the capability registry.
    inputs:
      - auth_model_v2.yaml
      - capability_registry.yaml
      - executor_routing_v2.yaml
    outputs:
      - per-domain auth alignment status
    failure_mode: >
      Action with undeclared permissions or missing auth class fails
      auth posture alignment.

  - order: 4
    id: bounded_claim_consistency
    description: >
      Verify no certification claim exceeds the actual action surface.
      Domains with zero routed actions must be marked as not-yet-certified
      and cannot claim coverage.
    inputs:
      - all certification phase outputs
    outputs:
      - per-domain certification verdict (certified/not-yet-certified)
    failure_mode: >
      Domain claiming certification without passing all prior phases
      fails bounded claim consistency.

governance_rules:
  fail_closed:
    description: >
      Any domain that fails any certification phase must be marked
      not-yet-certified. No partial certification is allowed.
  audit_completeness:
    description: >
      Every certification attempt produces a per-domain evidence record
      with phase-by-phase pass/fail status.
  bounded_claims:
    description: >
      Certification verdicts must not exceed the actual routed action surface.
      Domains with zero actions are explicitly not-yet-certified.
  determinism:
    description: >
      Same routing table plus same capability registry must produce the
      same certification verdicts on every replay.
  wave_alignment:
    description: >
      Certification verdicts must be consistent with the workforce release
      wave map exit criteria for W9.

