bounded_claims:
  supported:
  - marketing persona census and capability-family contract
  - registry-backed execution coverage for the three action-backed marketing personas
  - deterministic blocked-pack projection while the five deferred external-platform
    personas remain planned
  - preservation of the certified partial-activation department taxonomy for downstream
    certification compatibility
  unsupported:
  - claims that the five deferred external-platform personas are action-backed
  - mutation or activation beyond the three explicit registry-backed marketing personas
  - department status rebasing beyond the preserved downstream certification taxonomy
