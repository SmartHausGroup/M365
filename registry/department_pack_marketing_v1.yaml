department:
  id: marketing
  display_name: Marketing
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Marketing digital employees into one bounded department contract covering growth experimentation, content
    planning, social-channel operations, and community engagement responsibilities that are defined but not yet action-backed.
  bounded_claim: The Marketing department pack may only claim the authoritative contract personas, capability families, approval
    posture, and blocked readiness state declared here. It may not claim implemented external publishing, campaign execution,
    or channel-operation coverage until later acts activate those personas.
workflow_families:
- content_strategy_and_asset_preparation
- growth_experimentation_and_campaign_analysis
- social_channel_curation_and_publication_support
- community_engagement_and_feedback_harvesting
workload_families:
- Media, publishing, and extended communications
- Low-code, workflow, and analytics
- Documents, notes, and workspace productivity
- Knowledge, search, and employee experience
- Content, intranet, and files
- Mail, calendar, contacts, and bookings
- Collaboration, meetings, and communities
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the marketing lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:marketing
  department_lead: department-lead:marketing
  profiles:
    medium-operational:
      approvers:
      - department-owner:marketing
      personas:
      - growth-hacker
      rule: Growth experiments, funnel mutations, and campaign-analysis decisions require department-owner review when later
        acts activate the Marketing personas.
    low-observe-create:
      approvers:
      - department-owner:marketing
      personas:
      - app-store-optimizer
      - content-creator
      - instagram-curator
      - reddit-community-builder
      - tiktok-strategist
      - twitter-engager
      rule: Draft, asset-preparation, and social-planning work may proceed in observe/create mode until later acts activate
        outbound publication and community execution surfaces.
