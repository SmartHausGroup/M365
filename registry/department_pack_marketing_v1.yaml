department:
  id: marketing
  display_name: Marketing
  wave: W7
  wave_track: Wave A
  status: partial-activation
  purpose: Package the Marketing digital employees into one bounded department pack that reconciles to the staged post-H3 authoritative roster. Taylor Swift and Morgan Davis remain the only action-backed Marketing anchors in the staged model.
  bounded_claim: The Marketing department pack may claim registry-backed execution coverage only for Taylor Swift, Morgan Davis. The remaining 6 promoted personas remain persona-contract-only with zero supported actions until later activation acts.
workflow_families:
- content_strategy_and_asset_preparation
- growth_experimentation_and_campaign_analysis
- social_channel_curation_and_publication_support
- community_engagement_and_feedback_harvesting
workload_families:
- Media, publishing, and extended communications
- Low-code, workflow, and analytics
- Documents, notes, and workspace productivity
- Knowledge, search, and employee experience
- Content, intranet, and files
- Mail, calendar, contacts, and bookings
- Collaboration, meetings, and communities
pack_states:
  ready: Every pack persona is active and no accountability state requires intervention.
  watch: At least one pack persona is in warning state but none are escalated.
  attention_required: At least one pack persona is escalated and the marketing lead must intervene.
  blocked: An expected persona is missing, inactive, planned-only, or outside the declared authority.
approval_model:
  department_owner: department-owner:marketing
  department_lead: department-lead:marketing
  profiles:
    medium-operational:
      approvers:
      - department-owner:marketing
      personas:
      - growth-hacker
      - website-operations-specialist
      rule: Routine internal mutations require department-owner review; cross-department or externally visible changes remain gated until later activation acts widen the surface.
    low-observe-create:
      approvers:
      - department-owner:marketing
      personas:
      - app-store-optimizer
      - content-creator
      - instagram-curator
      - reddit-community-builder
      - tiktok-strategist
      - twitter-engager
      rule: Draft, research, planning, and internal-preparation work may proceed in observe/create mode until later activation acts unlock mutating execution surfaces.
