name: agent-task

on:
  workflow_dispatch:
    inputs:
      task:
        description: Agent instruction text
        required: true
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-agent:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/agent '))
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      ALLOWED_PATHS: smarthaus.ai/app/ docs/ api/ src/
      AGENT_SCOPE: mixed
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          cursor-agent --help | head -n 2 || true

      - name: Install Python deps (if requirements.txt)
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Node deps (if package.json)
        if: hashFiles('package.json') != ''
        run: |
          npm ci
        env:
          CI: true

      - name: Extract prompt
        id: prompt
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            body="${{ github.event.comment.body }}"
            # Extract after '/agent ' (first occurrence)
            prompt="$(echo "$body" | sed -n 's/.*\/agent[[:space:]]\{1,\}\(.*\)$/\1/p')"
            if [[ -z "$prompt" ]]; then
              echo "No /agent command found in comment body." >&2
              exit 1
            fi
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            echo "$prompt" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Make wrapper executable
        run: chmod +x scripts/agent_wrapper.sh

      - name: Run agent wrapper
        run: |
          scripts/agent_wrapper.sh "${{ steps.prompt.outputs.text }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ALLOWED_PATHS: ${{ env.ALLOWED_PATHS }}
          AGENT_SCOPE: ${{ env.AGENT_SCOPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            cursor-run.txt
            test-summary.txt
            pr_url.txt

      - name: Echo PR URL
        if: always()
        run: |
          if [[ -f pr_url.txt ]]; then
            echo "PR: $(tail -n1 pr_url.txt)"
          else
            echo "No PR was created."
          fi

      - name: Verify Python tests
        if: hashFiles('requirements.txt') != '' || hashFiles('tests/**') != ''
        run: pytest -q

      - name: Verify Node tests
        if: hashFiles('package.json') != ''
        run: |
          if node -e "try{process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)}catch(e){process.exit(1)}"; then
            npm test --silent
          else
            echo "No test script defined in package.json; skipping."
          fi
        env:
          CI: true

