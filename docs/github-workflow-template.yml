name: M365 Dispatch

on:
  push:
  pull_request:
  issues:
    types: [opened, edited, closed, reopened, assigned, labeled]
  release:
    types: [published]
  milestone:
    types: [created, closed]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send event to M365 Platform
        env:
          WEBHOOK_URL: ${{ secrets.M365_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.M365_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "M365_WEBHOOK_URL not set; skipping."; exit 0;
          fi
          EVENT_FILE=$(mktemp)
          echo "${{ toJson(github.event) }}" > "$EVENT_FILE"
          SIG=$(echo -n $(cat "$EVENT_FILE") | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | xxd -p -c 256)
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -H "Content-Type: application/json" \
            --data-binary @"$EVENT_FILE" | sed -e 's/.*/[M365] &/'

