lemma_id: L56
title: M365 Testing Department Pack v1
invariant: >
  The Testing department pack must be projected from one declared Testing
  authority, one authoritative persona registry, and one deterministic
  pack-state rule so the department boundary, coverage status, zero-action
  claim, and blocked readiness posture cannot drift between runtime surfaces.
proof_obligations:
  - testing department pack authority file exists and validates
  - declared Testing personas all exist in the authoritative persona registry
  - contract-only Testing personas declare zero supported actions
  - projected coverage statuses match the declared pack authority
  - pack state is derived deterministically from persona status and accountability state
failure_boundaries:
  - missing Testing department pack authority file
  - missing expected persona
  - contract-only persona declares supported actions
  - coverage-status mismatch between authority and runtime projection
  - testing pack returns ready while personas remain planned-only
test_bindings:
  - tests/test_testing_department_pack_v1.py
ci_gate: scripts/ci/verify_testing_department_pack_v1.py
