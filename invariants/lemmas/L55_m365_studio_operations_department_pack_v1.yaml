lemma_id: L55
title: M365 Studio Operations Department Pack v1
invariant: >
  The Studio Operations department pack must be projected from one declared
  Studio Operations authority, one authoritative persona registry, and one
  deterministic pack-state rule so the department boundary, coverage status,
  zero-action claim, and blocked readiness posture cannot drift between runtime
  surfaces.
proof_obligations:
  - studio-operations department pack authority file exists and validates
  - declared Studio Operations personas all exist in the authoritative persona registry
  - contract-only Studio Operations personas declare zero supported actions
  - projected coverage statuses match the declared pack authority
  - pack state is derived deterministically from persona status and accountability state
failure_boundaries:
  - missing Studio Operations department pack authority file
  - missing expected persona
  - contract-only persona declares supported actions
  - coverage-status mismatch between authority and runtime projection
  - studio-operations pack returns ready while personas remain planned-only
test_bindings:
  - tests/test_studio_operations_department_pack_v1.py
ci_gate: scripts/ci/verify_studio_operations_department_pack_v1.py
