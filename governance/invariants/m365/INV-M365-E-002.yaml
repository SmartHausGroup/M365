id: INV-M365-E-002
category: Audit Semantics
derived_from:
  - "Phase 1 Section 5: Audit Event Semantics (no audit on failure)"
  - "Phase 1 Section 6: Determinism and Failure Constraints"
statement: >
  Failed or rejected instructions produce zero audit records.
  Invalid or rejected evaluation produces no audit records.
scope:
  inputs:
    - instruction
    - tenant_state
  outputs:
    - result
    - new_tenant_state
    - audit_events
pass_condition:
  Whenever evaluation is undefined (rejected) or result indicates
  failure, |audit_events| = 0.
fail_condition:
  Evaluation rejected or result indicates failure, and |audit_events| > 0.
notes:
  Rejection means Eval(instruction, tenant_state) is undefined.
  Failure means a defined result that is not success. This invariant
  covers both failure-closed audit semantics and failed-result audit semantics.
