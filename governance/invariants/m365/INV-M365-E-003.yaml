id: INV-M365-E-003
category: Audit Semantics
derived_from:
  - "Phase 1 Section 4: Mutation vs Read Semantics (read-only)"
  - "Phase 1 Section 5: Audit Event Semantics (read-only and User)"
statement: >
  Read-only actions and User-persona actions produce zero audit records
  when evaluation is defined.
scope:
  inputs:
    - instruction
    - tenant_state
  outputs:
    - result
    - new_tenant_state
    - audit_events
pass_condition:
  For every evaluation where persona = User or action ∈ A_read,
  |audit_events| = 0.
fail_condition:
  (persona = User or action ∈ A_read) and |audit_events| > 0.
notes:
  Combined with E-001 and E-002, audit events exist only for
  successful Admin mutations, and exactly one in that case.
