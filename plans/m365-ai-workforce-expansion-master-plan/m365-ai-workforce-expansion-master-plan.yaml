plan_id: m365-ai-workforce-expansion-master-plan
status: Active
date: "2026-03-20"
owner: SMARTHAUS
execution_plan_reference: plan:m365-ai-workforce-expansion-master-plan:R1
north_star: Operations/NORTHSTAR.md
historical_lineage: m365-enterprise-readiness-master-plan
ma_process_required: false

objective: >
  Define and execute the full SMARTHAUS agentic workforce expansion program so Claude can delegate through UCP into a governed M365 pack that covers the full explicitly-inventoried Microsoft 365 capability universe across all departments and personas.

decision_rule: >
  The workforce is not complete until the full department/persona universe, the full governable M365 capability universe, the bounded executor and auth model, the digital-employee runtime, the department packs, the Claude/UCP delegation layer, the live certification evidence, and the final release decision are all green. Documentation or isolated slices alone are not sufficient.

prompt_discipline: >
  Every grouped phase and every child act in this plan must have one formal MATHS prompt pair under docs/prompts/. Prompt files must follow the MATHS template structure and the repo two-file prompt rule.

persona_count_target: 39
department_count_target: 10
source_roster: registry/ai_team.json
department_targets:
  - operations
  - hr
  - communication
  - engineering
  - marketing
  - product
  - project-management
  - studio-operations
  - testing
  - design
workload_universe_targets:
  - "Identity, directory, and tenant administration"
  - "Mail, calendar, contacts, and bookings"
  - "Collaboration, meetings, and communities"
  - "Content, intranet, and files"
  - "Tasks, scheduling, and work management"
  - "Documents, notes, and workspace productivity"
  - "Knowledge, search, and employee experience"
  - "Low-code, workflow, and analytics"
  - "Security, compliance, and data governance"
  - "Devices, endpoint management, and adjacent Windows admin surfaces"
  - "Media, publishing, and extended communications"

