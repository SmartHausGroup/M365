north_star_alignment:
  source: Operations/NORTHSTAR.md
  principles:
  - truthful authoritative workforce governance instead of silent runtime expansion
  - department-based organization preserved unless a later explicit governed change says otherwise
  - policy-gated, auditable, fail-closed persona activation rules
  anti_alignment:
  - Does NOT silently claim the current 39-persona and 10-department North Star is already rebased to 59.
  - Does NOT add freeform personality schema.
  - Does NOT activate any new persona in runtime during this planning slice.
decision_summary:
  chosen_option: preserve_10_department_model_by_default
  bounded_metadata_fields:
  - working_style
  - communication_style
  - decision_style
  activation_gate:
  - real_name
  - title
  - department
  - manager
  - escalation_owner
  - capability_map_entry
  - authoritative_registry_entry
  - rebased_certification_counts
options_considered:
- id: A
  description: Remap the 20 extras into the existing 10 departments and rebase the authoritative census.
  pros:
  - Preserves current North Star claims.
  - Minimizes governance drift.
  - Avoids needless department proliferation.
  cons:
  - Some personas need careful placement decisions.
- id: B
  description: Expand the department model at the same time as the persona census.
  pros:
  - Allows cleaner grouping for some extras.
  cons:
  - Widens the change boundary into North Star and operating-model change.
- id: C
  description: Add a broader freeform personality schema while rebasing the census.
  pros:
  - Maximum expressive flexibility.
  cons:
  - Weakens determinism.
  - Complicates validation.
  - Adds unnecessary governance surface.
complexity_warning:
  statement: Expanding the census, department model, and personality schema simultaneously adds complexity without improving fail-closed guarantees.
  simpler_path: Preserve the 10-department model by default and keep the metadata contract bounded.
scope:
  in_scope:
  - create the approved feature branch for this governed planning package
  - create the formal plan triplet in Markdown, YAML, and JSON
  - create the remaining H2 through H5 child-phase plan triplets in Markdown, YAML, and JSON
  - create the required prompt pairs for the governed child-phase execution packages
  - update Operations/EXECUTION_PLAN.md, Operations/PROJECT_FILE_INDEX.md, and Operations/ACTION_LOG.md
  - repair the bounded mandatory pre-commit remediation set in tests/test_ucp_m365_pack_contracts.py and tests/test_ucp_m365_pack_client.py if it prevents R5 closeout
  - define future implementation requirements for census rebase, metadata contract, registry rebase, count rebase, and fail-closed activation
  out_of_scope:
  - editing registry/ai_team.json
  - editing registry/persona_registry_v2.yaml
  - editing registry/persona_capability_map.yaml
  - editing registry/agents.yaml
  - changing runtime router, approval, audit, or activation code
