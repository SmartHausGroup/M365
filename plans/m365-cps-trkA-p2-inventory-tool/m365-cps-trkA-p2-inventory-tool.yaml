implementation_approach:
  options_considered:
    - id: A
      description: All-at-once monolithic change
      pros:
        - fewer commits
      cons:
        - drift risk
        - no per-phase gates
    - id: B
      description: Per-track / per-parent / per-child phase hierarchy
      pros:
        - enforced cadence
        - per-task scope fence
      cons:
        - more files
  chosen: B
  rationale: Granular commits enforce cadence; per-task MATHS prompts give executor zero drift opportunity.
  rejected_rationale:
    A: Too coarse; would require massive PR review and lose per-phase gate value
  adr_ref: null
