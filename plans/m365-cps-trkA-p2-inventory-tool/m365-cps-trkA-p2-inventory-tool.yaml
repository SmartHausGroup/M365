    validation_command: "cd $UCP_ROOT && git log --oneline -1 | grep 'plan:m365-cps-trkA-p2' && cd $M365_ROOT && git log --oneline -1 | grep 'plan:m365-cps-trkA-p2'"
    implementation_notes: null
    files_to_read: []
    files_to_modify: []
