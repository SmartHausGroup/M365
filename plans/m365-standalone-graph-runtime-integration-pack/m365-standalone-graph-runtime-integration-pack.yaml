    acceptance: CTO approves the real-integration intent and current artifact gap truth.
  - id: R2
    title: Formal readiness/action calculus
    acceptance: Readiness and execution predicates are documented with deterministic failure classes.
  - id: R3
    title: Lemmas and invariants
    acceptance: Lemma docs and invariant YAML bind artifact, auth, permission, readiness, audit, and packaging obligations.
  - id: R4
    title: Notebook scorecard gate
    acceptance: Notebook replay is green and scorecard certifies deterministic extraction readiness.
  - id: R5
    title: Runtime service and auth
    acceptance: Installed artifact launches runtime service and exposes real Microsoft auth setup/status/clear flows.
  - id: R6
    title: Graph read-only action runtime
    acceptance: Read-only Graph actions execute with permission matrix, retry bounds, normalized errors, and audit.
  - id: R7
    title: UCP lifecycle contracts
    acceptance: UCP resolves setup, auth, health, readiness, action, and lifecycle contracts from installed artifact.
  - id: R8
    title: Reproducible packaging
    acceptance: Final .ucp.tar.gz includes runtime service, checksums, signatures, provenance, and conformance evidence.
  - id: R9
    title: Installed-artifact acceptance
    acceptance: Source-removal and live read-only UCP-to-Graph acceptance pass.
  - id: R10
    title: Operations and rollback
    acceptance: Runbook, rollback, token recovery, version migration, and support evidence are complete.
