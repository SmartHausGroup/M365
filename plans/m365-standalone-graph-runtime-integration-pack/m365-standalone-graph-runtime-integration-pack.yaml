objective: Build a real standalone Microsoft Graph auth/runtime integration pack that UCP can install, launch, configure, health-check, and invoke from the installed marketplace artifact.
current_truth:
  - The current artifact is a UCP-facing client/contract pack.
  - The current artifact requires a configured M365 service URL for live work.
  - The current artifact does not contain the full Microsoft Graph runtime service.
  - A real integration pack must include the runtime service and fail closed until auth and Graph health pass.
  - The 1.1.1 snapshot is historical prerelease evidence, not a formal ready artifact.
  - The active corrective target is com.smarthaus.m365@0.1.2.
  - Installed-payload readiness currently fails art=false.
approval_governance_gates:
  - Present Phase P0 intent packet before implementation.
  - Wait for explicit CTO go before each parent phase.
  - Call MCP validate_action before every mutating action and obey the verdict.
  - Stop on first red invariant, failed scorecard, or source-repo dependency.
  - Do not auto-advance child or parent phases.
scope:
  in:
    - MA formalization for standalone pack readiness and action execution.
    - Microsoft OAuth delegated auth and app-only auth setup contracts.
    - Secure token storage policy.
    - Local runtime service launched from installed artifact.
    - UCP setup/auth/health/action contracts.
    - Read-only Microsoft Graph action acceptance.
    - Reproducible marketplace artifact packaging.
  out:
    - Username/password storage.
    - UCP-embedded Graph implementation.
    - Runtime sibling repo lookup.
    - Write actions before separate mutation-governance approval.
    - Public SaaS hosting or webhook receivers.
