ma_process_required: true
canonical_predecessor: plans/m365-ucp-live-activation-repair/m365-ucp-live-activation-repair.md (M365-local artifact; sibling UCP repo is historical implementation lineage only)
draft_vs_active_semantics: >
  The parent initiative remains Active while all child acts begin in Draft. A child act
  becomes Active only after its predecessor gate is green and the operator approves
  execution with explicit go. A child act becomes Complete only after its own gate emits GO.
objective: >
  Create the M365-governed master remediation program for the remaining service-mode
  runtime and token-acquisition work so future execution happens in the correct repo
  under strict phase-gated MATHS prompts.
decision_rule: >
  ServiceRuntimeReady = SupportedPython AND RequiredDependenciesPresent AND HealthReachable.
  TokenPathKnown = ServiceRuntimeReady AND CredentialSourceResolved AND AuthModeResolved
  AND ProviderPathObserved. TokenAcquisitionHealthy = TokenPathKnown AND (TokenGranted
  OR TruthfulDownstreamFailure). LiveM365Ready = TokenAcquisitionHealthy AND SitesRootGreen
  AND (DirectoryOrgGreen OR RealGraphPermissionError). RemediationReady = LiveM365Ready.
prompt_discipline: >
  One detailed MATHS prompt plus one kickoff prompt per phase under docs/prompts/.
  No phase may advance until its active validation gate is green.
intent_definition:
  build: M365-native remediation authority for the remaining runtime/token-acquisition work.
  why: The unresolved defect now belongs to the M365 runtime and token-provider path, not UCP.
  problem: Remove repo-authority drift and define one sequential execution program for the remaining work.
  boundaries:
    - Plan and prompt creation only in this slice.
    - No runtime implementation in this slice.
    - No edits to the sibling UCP repo.
  guarantees:
    - M365 is the planning authority for the remaining work.
    - Each phase is independently testable and stop-on-red.
    - Token outcomes are classified truthfully.
  success_criteria:
    - Parent plan exists.
    - Child phase plans exist.
    - One prompt pair exists per phase.
    - Governance and file index are synchronized.
  determinism: Fixed code, config, and tenant posture produce the same phase gate and outcome class.
scope:
  in:
    - Create the parent plan triplet.
    - Create child phase plan triplets.
    - Create one prompt pair per phase.
    - Update execution plan, action log, and project file index.
  out:
    - Runtime implementation.
    - Sibling UCP edits.
    - Secret rotation or tenant permission changes.
