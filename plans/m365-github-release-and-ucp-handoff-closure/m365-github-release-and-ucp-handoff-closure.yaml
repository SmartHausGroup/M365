hard_boundaries:
  - Do not mutate UCP or sibling repos.
  - Do not force-push.
  - Do not use git reset --hard.
  - Do not move an existing release tag without explicit CTO approval.
  - Do not publish from a dirty worktree.
  - Do not log secrets, tokens, device codes, auth codes, refresh tokens, client secrets, private keys, subject object IDs, or phone numbers.
hard_blockers:
  - wrong repo, branch, or remote
  - remote branch divergence
  - branch protection with no PR path
  - tag exists on a different commit
  - GitHub release permission missing
  - downloaded release checksum mismatch
  - clean-main rebuild cannot converge
  - source-repo dependency reappears
  - UCP mutation is required to finish M365 release closure
