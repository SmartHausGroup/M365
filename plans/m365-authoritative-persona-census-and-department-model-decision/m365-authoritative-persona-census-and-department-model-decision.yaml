  - present approval packet first
  - wait for explicit go
  - call MCP validate_action before any mutating action and obey the verdict
  - stop on first red
  - do not auto-advance to H2
objective: Lock the census rebase contract from 39 to 59 and decide whether all 20 extras fit within the existing 10 departments.
decision_rule:
  baseline_ready:
    runtime_agents: 59
    authoritative_personas: 39
    current_departments: 10
    extras_to_map: 20
  h1_go_formula: BaselineReady AND RemapValid AND ProjectedTruthConsistent
  fail_closed_rule: If any extra agent requires a new department or projected counts do not reconcile to 59 across 10 departments, emit NO-GO and open a separate governed department-model change.
scope:
  in:
    - Restate the current authoritative baseline.
    - Evaluate all 20 extras against the current 10 departments only.
    - Publish mapping matrix and projected department counts.
    - Produce an explicit H1 decision artifact and diagnostics artifact.
    - Define the fail-closed handoff into H2 through H5.
  out:
    - Editing registry/ai_team.json.
    - Editing registry/persona_registry_v2.yaml.
    - Editing registry/persona_capability_map.yaml.
    - Editing registry/agents.yaml.
    - Activating promoted personas.
    - Changing Operations/NORTHSTAR.md.
