implementation_approach:
  options_considered:
    - id: "option_a"
      description: "Repair the bounded M365 service-auth/runtime defect inside the existing M365 service."
      pros:
        - "Matches the current live failure location at the M365 `/actions/*` JWT gate."
        - "Preserves the correct cross-repo order: M365 service repair first, UCP caller alignment second."
        - "Keeps the phase bounded to the resident FastAPI/ops-adapter runtime."
      cons:
        - "Still requires careful scope control to avoid drifting into UCP-side work."
    - id: "option_b"
      description: "Shift the next repair into UCP-side caller alignment first."
      pros:
        - "Could reduce future caller/service mismatch if the M365 service contract were already green."
      cons:
        - "Inverts the current contract order and ignores the fact that the local M365 service gate is the first failing boundary."
        - "Would make M365-side service-auth truth ambiguous again."
  chosen: "Repair the bounded M365 service-auth/runtime defect inside the existing M365 service."
  rationale: "The current live failure is local to the M365 service JWT gate before Graph token acquisition, so the next repair must stay inside the M365 service boundary. This preserves truthful sequencing, keeps JWT-backed actor identity fail-closed, and leaves UCP-side caller alignment as the dependent next act rather than an overlapping guess."
  rejected_rationale:
    option_b: "Shifting to UCP-side caller alignment first would reintroduce middle-out probing and weaken the cross-repo contract order locked by the current service-auth note."
  adr_ref: null

risks:
  items:
    - risk: "The repair could drift into UCP-side caller work."
