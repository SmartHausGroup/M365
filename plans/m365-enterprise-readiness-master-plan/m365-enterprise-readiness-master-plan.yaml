      Certification candidate 52ca494 and the refreshed evidence packet now
      prove that the SMARTHAUS tenant YAML contract resolves, carries the
      Operations approval target, and provides an app-only certificate-backed
      credential contract; the exact standalone shell contract is now defined
      as UCP_ROOT=/Users/smarthaus/Projects/GitHub/UCP,
      UCP_TENANT=smarthaus, ALLOW_M365_MUTATIONS=true, and
      ENABLE_AUDIT_LOGGING=true; direct Graph probes under that contract
      return organization=200 but site_discovery=503 UnknownError for the
      SMARTHAUS Operations site, so the standalone M365 C1A gate remains
      NO-GO until the approval backend is reachable and the exact shell
      contract is active.
      CAIO is out of scope for this certification path.
