open_enterprise_blockers:
  - >
    Live-tenant certification remains NO-GO until the non-production
    execution environment persists the exact launch contract
    (UCP_ROOT=/Users/smarthaus/Projects/GitHub/UCP, UCP_TENANT=smarthaus,
    ALLOW_M365_MUTATIONS=true, ENABLE_AUDIT_LOGGING=true) and the
    tenant-backed approval target becomes reachable through Graph or is
    supplied via explicit site and list IDs. The SMARTHAUS tenant YAML,
    approval target, and primary app-only certificate-backed credential
    contract are already in place. CAIO is out of scope for this standalone
    M365 certification path.
  - >
    C2, D1, and D2 remain downstream of the live-evidence
    blockers.

