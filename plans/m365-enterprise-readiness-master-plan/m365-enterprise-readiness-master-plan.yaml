objective: >
  Define and execute the full critical path required to make the current M365
  capability commercially honest, operationally supportable, technically
  hardened, standards-compliant, and enterprise-ready as a standalone
  deterministic module.

decision_rule: >
  Enterprise readiness requires product boundary lock, runtime hardening,
  repo-validation closure, app-registration role separation, executor
  credential finalization, live-tenant certification, release decision
  closure, and launch readiness. Documentation alone is not sufficient.

prompt_discipline: >
  Every execution act in this plan must have one formal MATHS prompt pair
  under docs/prompts/. Historical commercialization prompts remain traceability
  artifacts only.

