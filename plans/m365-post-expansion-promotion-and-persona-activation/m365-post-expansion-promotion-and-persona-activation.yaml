plan_id: m365-post-expansion-promotion-and-persona-activation
status: Active
date: '2026-03-21'
owner: SMARTHAUS
execution_plan_reference: plan:m365-post-expansion-promotion-and-persona-activation:R1
north_star: Operations/NORTHSTAR.md
historical_lineage: m365-ai-workforce-expansion-master-plan
ma_process_required: false
objective: 'Move the completed workforce program from development into staging and then main, then execute a bounded
  follow-on program that turns selected contract-only personas into registry-backed, action-backed, commercially
  claimable digital employees.

  '
decision_rule: 'PromotionReady = DevelopmentMerged AND StagingAligned AND StagingValidated AND MainAligned.
  PersonaActivated = RegistryBacked AND ActionSurfaceImplemented AND AllowedDomainsBound AND ApprovalPolicyBound
  AND NotebookEvidenceGreen AND ScorecardGreen AND RuntimeRoutingGreen. CommercialActivationReady = PromotionReady
  AND Wave1ActivationGreen.

  '
prompt_discipline: 'Maintain a formal prompt pair for the branch-promotion track and the persona-activation
  follow-on track under docs/prompts/, following the repo two-file prompt rule and the MATHS prompt template
  where execution details are delegated to Codex or Claude.

  '
simple_follow_on_plan:
  activation_meaning:
  - Move personas from persona-contract-only to registry-backed with real allowed actions.
  - Bind each activated persona to bounded executor domains, auth rules, approvals, and audit semantics.
  - Produce notebook-backed evidence, tests, and scorecards so delegation claims remain honest.
  - Make the persona truly reachable through Claude -> UCP -> M365, not just present in the registry.
  activate_first:
  - persona_id: backend-architect
    why: Unlocks service architecture, API, and governance-aware backend planning for later waves.
  - persona_id: devops-automator
    why: Unlocks safer release, environment, and CI/CD execution for the rest of the workforce.
  - persona_id: api-tester
    why: Unlocks fast certification loops and regression proof for every new persona action surface.
  - persona_id: analytics-reporter
    why: Unlocks reporting, ROI evidence, and customer-facing proof of value.
  - persona_id: project-shipper
    why: Unlocks release coordination, launch control, and delivery discipline.
  - persona_id: support-responder
    why: Unlocks live customer support handling and post-launch operational credibility.
  order:
  - phase: P1
    description: Promote development to staging, validate staging, then promote staging to main.
  - phase: P2B
    description: Activate the foundation operators first.
  - phase: P2C
    description: Activate the commercial growth and experience personas second.
  - phase: P2D
    description: Activate the specialist and regulated personas last.
  - phase: P2E
    description: Certify the activated waves and update commercial packaging.
  commercial_unlocks:
  - P1 unlocks governed release promotion out of development.
  - P2B unlocks a credible build, ship, validate, report, and support workforce core.
  - P2C unlocks stronger product, design, and growth packages customers can buy.
  - P2D unlocks the higher-value specialist workforce story only after safer layers are live.
  - P2E unlocks honest commercial claims that persona activation has materially advanced.
