gates:
  checks:
  - id: CHECK:C0
    name: Plan schema validation
    description: The successor replay YAML must validate against the canonical UCP
      plan schema.
    task_ref: T1
    validation_command: ../UCP/.venv/bin/python -c "import json, pathlib, yaml; from
      jsonschema import Draft202012Validator; schema=json.loads(pathlib.Path('../UCP/agent_governance/PLAN_TEMPLATE_SCHEMA.json').read_text());
      data=yaml.safe_load(pathlib.Path('plans/m365-authoritative-persona-humanization-merge-replay-to-development/m365-authoritative-persona-humanization-merge-replay-to-development.yaml').read_text());
      Draft202012Validator(schema).validate(data); print('plan schema ok')"
    pass_criteria: The YAML replay package validates.
    fail_action: block
  - id: CHECK:C1
    name: Prompt contract validation
    description: The detailed and kickoff prompts must validate under the governed
      prompt contract.
    task_ref: T1
    validation_command: |-
      python3 - <<'PY'
      from pathlib import Path
      checks = {
          'docs/prompts/codex-m365-authoritative-persona-humanization-merge-replay-to-development.md': ['PLAN_REF_ACK:', 'PARENT_PLAN_ACK:', 'NORTH_STAR_ACK:'],
          'docs/prompts/codex-m365-authoritative-persona-humanization-merge-replay-to-development-prompt.txt': ['Plan Reference:', 'Execute the governed package at'],
      }
      for path, needles in checks.items():
          text = Path(path).read_text()
          for needle in needles:
              assert needle in text, (path, needle)
          print(path, 'accepted')
      PY
    pass_criteria: Both replay prompt artifacts contain the required governed prompt anchors.
    fail_action: block
  - id: CHECK:C2
    name: Governance evidence parse
    description: The notebook-backed governance evidence and generated verification
      artifact must parse cleanly.
    task_ref: T1
    validation_command: |-
      python3 - <<'PY'
      import json
      from pathlib import Path
      for path in [
          Path('notebooks/m365/INV-M365-CG-authoritative-persona-merge-replay-package-governance-alignment-v1.ipynb'),
          Path('configs/generated/authoritative_persona_merge_replay_package_governance_alignment_v1_verification.json'),
      ]:
          json.loads(path.read_text())
      print('governance evidence parse ok')
      PY
    pass_criteria: Notebook and verification JSON parse cleanly.
    fail_action: block
  - id: CHECK:C3
    name: Clean diff gate
    description: The package creation slice must keep git diff --check green.
    task_ref: T1
    validation_command: git diff --check
    pass_criteria: No whitespace or patch-format issues exist.
    fail_action: block
  decision:
    go_rule: The successor replay package, prompt pair, and notebook-backed governance
      evidence all validate cleanly, and the repo now truthfully points the next
      M1 act at the corrected replay source branch.
    no_go_rule: The successor replay package remains schema-invalid, lacks notebook-backed
