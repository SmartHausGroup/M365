implementation_approach:
  options_considered:
  - id: A
    description: Reuse the stale predecessor merge package and treat the corrected
      source branch as an implicit override.
    pros:
    - Fastest path.
    cons:
    - Leaves false governance authority in place.
    - Makes the next M1 approval packet misleading.
  - id: B
    description: Create a successor replay package with explicit notebook-backed governance
      evidence and preserve the predecessor package as historical lineage only.
    pros:
    - Matches the corrected replay boundary truthfully.
    - Keeps the blocked replay history auditable.
    cons:
    - Adds one governance-only package-creation slice before replay execution.
  - id: C
    description: Rewrite the predecessor merge package in place.
    pros:
    - Keeps a single package path.
    cons:
    - Destroys the historical blocked-merge lineage.
    - Makes prior M1 failures harder to audit.
  chosen: B
  rationale: The replay boundary changed after the completed L83 and L84 blocker
    corrections, so the next M1 act needs a truthful successor package that points
    at the corrected source branch without erasing the historical package that governed
    the blocked attempts.
  rejected_rationale:
    A: Implicit override is not truthful enough for fail-closed governance.
    C: In-place rewrite would erase auditability of the blocked replay history.
  adr_ref: null
