  Certification'
domain: infrastructure
math_algorithm_scope: false
objective: Lock and certify the full persona-to-action graph so every persona is either
  reachable or fenced, every persona action is either mapped to a real execution path
  or fenced, and the workforce graph contains no unclassified orphan surface.
current_state: 'The repo now has a truthfully reduced direct support matrix at 155
  direct instruction actions with 64 certified green and 91 fenced. But the workforce
  graph is broader: 59 agents in registry/agents.yaml, 184 persona-facing allowed-action
  aliases, 125 aliases outside the current direct crosswalk, and 41 legacy stub actions
  across 8 agents in src/ops_adapter/actions.py.'
target_state: Every persona in the authoritative workforce graph is classified for
  reachability, every persona-facing action is classified for mapping and execution
  truth, every orphan action is identified, and the final workforce certification
  matrix says exactly which persona/action pairs are live-green, approval-gated, fenced,
  stubbed, or orphaned.
requirements:
- id: R0
  text: Create the governed persona-to-action certification package before any new
    workforce certification work.
- id: R1
  text: Lock the workforce graph from persona, capability, approval, and routing truth
    sources.
- id: R2
  text: Certify persona reachability through the governed runtime or explicitly fence
    unreachable personas.
- id: R3
  text: Classify every persona-facing action as mapped, orphaned, dead-routed, legacy-stubbed,
    or fenced.
- id: R4
  text: Certify execution truth across unique actions and material persona/action
    paths.
- id: R5
  text: Repair repo-local defects or explicitly reduce the claimed workforce surface.
- id: R6
  text: Publish the final workforce certification matrix and diagnostics artifact.
