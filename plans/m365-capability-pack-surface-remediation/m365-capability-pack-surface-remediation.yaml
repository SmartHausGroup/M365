determinism: null
artifacts: []
environment:
  python_version: ">=3.11"
  venv: .venv/bin/python
  additional_dependencies: []
  hardware: standard CI; live tenant for GATE smoke tests
  external_data:
    - live M365 tenant (smarthausgroup.com)
  pre_notebook_check: N/A
implementation_approach:
  options_considered:
    - id: A
      description: All-at-once monolithic change
      pros:
        - fewer commits
      cons:
        - drift risk
        - no per-phase gates
    - id: B
      description: Per-track / per-parent / per-child phase hierarchy
      pros:
        - enforced cadence
        - per-task scope fence
      cons:
        - more files
  chosen: B
  rationale: Granular commits enforce cadence; per-task MATHS prompts give executor zero drift opportunity.
  rejected_rationale:
    A: Too coarse; would require massive PR review and lose per-phase gate value
  adr_ref: null
risks:
  items:
    - risk: Live tenant rate limits during smoke tests
      impact: medium
      mitigation: Backoff + spread across parent phases; cache token
      status: open
    - risk: Track B coverage scope grows beyond plan
      impact: high
      mitigation: Per-parent-phase allowlist enforces scope fence
      status: mitigated
    - risk: Cross-repo drift between UCP and M365 plan copies
      impact: medium
      mitigation: Generator script as single source of truth; re-run to sync
      status: mitigated
    - risk: Status code change breaks downstream consumers
      impact: medium
      mitigation: Track A introduces new code without removing old behavior; deprecation in Track C
      status: mitigated
    - risk: Re-packaging M365 release breaks UCP binding
      impact: high
      mitigation: release_artifacts.py SHA pinning; release artifact acceptance test
      status: mitigated
  hard_blockers:
    - M365 main branch frozen during release cut
    - Tenant unavailability during GATE smoke tests
    - PLAN_TEMPLATE_SCHEMA changes mid-execution
rollback:
  procedure:
    - Revert commits on the feature branch.
    - "If parent phase pushed: revert push via new revert commits."
    - Update ACTION_LOG with rollback entry.
    - Set this plan status to cancelled.
  files_to_revert:
    - all files in this plan's allowlist that were modified
  artifacts_to_delete:
    - any generated artifact files for this plan
  governance_updates_on_rollback:
    - ACTION_LOG entry with rollback reason
    - EXECUTION_PLAN revert progress
    - "This plan: status to cancelled"
