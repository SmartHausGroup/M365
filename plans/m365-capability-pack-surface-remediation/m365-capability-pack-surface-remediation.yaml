gates:
  checks:
    - id: "CHECK:C0"
      name: Plan schema valid
      description: Master plan + all sub-plans validate against PLAN_TEMPLATE_SCHEMA
      task_ref: T1, T2, T3
      validation_command: .venv/bin/python scripts/validate_plan_schema.py plans/m365-capability-pack-surface-remediation/m365-capability-pack-surface-remediation.yaml
      pass_criteria: exit code 0
      fail_action: block
    - id: "CHECK:C1"
      name: Track A complete
      description: All Track A parent phases green; live integration pass
      task_ref: T1
      validation_command: .venv/bin/python scripts/check_track_complete.py trkA
      pass_criteria: All parent-phase plan statuses == complete
      fail_action: block
    - id: "CHECK:C2"
      name: Track B complete
      description: All Track B parent phases green; live tenant smoke pass
      task_ref: T2
      validation_command: .venv/bin/python scripts/check_track_complete.py trkB
      pass_criteria: All parent-phase plan statuses == complete
      fail_action: block
    - id: "CHECK:C3"
      name: Track C complete
      description: All Track C parent phases green
      task_ref: T3
      validation_command: .venv/bin/python scripts/check_track_complete.py trkC
      pass_criteria: All parent-phase plan statuses == complete
      fail_action: block
  decision:
    go_rule: All gates pass
    no_go_rule: Any gate fails
  no_go_triggers:
    - Any track plan in failed or blocked state
    - Any parent-phase plan unable to complete its GATE
    - Live tenant smoke regression on previously-green action
