    before retrying the development merge validation.
  pros:
  - Fixes the real root cause.
  - Preserves fail-closed merge governance.
  - Keeps development unpushed until green.
  cons:
  - Adds one more correction branch before M1 can resume.
- id: B
  description: Drop the failing certification and release-gate checks from M1.
  pros:
  - Faster immediate path to a push.
  cons:
  - Bypasses the real inconsistency.
  - Violates fix-the-root-cause governance.
- id: C
  description: Patch the stale surfaces directly on development after the failed merge.
  pros:
  - Repairs the current local merge state in one place.
  cons:
  - Develops the correction on unvalidated development instead of a dedicated feature branch.
